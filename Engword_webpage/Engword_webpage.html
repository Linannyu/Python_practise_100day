<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050b13">
  <title>SAT 词汇征服者</title>
  <style>
    :root {
      --bg: #050b13;
      --panel: rgba(15, 23, 37, 0.84);
      --panel-2: rgba(21, 28, 44, 0.9);
      --line: rgba(120, 245, 236, 0.2);
      --line-soft: rgba(151, 167, 205, 0.14);
      --cyan: #35f5e8;
      --cyan-2: #69fbef;
      --pink: #ff23cb;
      --violet: #8d6cff;
      --red: #ff4b79;
      --green: #68eeaa;
      --yellow: #ffe57b;
      --text: #f4f6ff;
      --muted: #aeb7d2;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.36);
      --serif: Georgia, "Times New Roman", serif;
      --sans: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 22%, rgba(27, 239, 214, 0.08), transparent 28%),
        radial-gradient(circle at 88% 24%, rgba(255, 28, 199, 0.1), transparent 27%),
        radial-gradient(circle at 54% 100%, rgba(108, 75, 255, 0.1), transparent 34%),
        var(--bg);
      font-family: var(--sans);
      line-height: 1.55;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.22;
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, black, transparent 85%);
    }

    button, input, select { font: inherit; }
    button { color: inherit; }

    .topbar {
      position: sticky;
      z-index: 50;
      top: 0;
      height: 76px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 11, 19, 0.83);
      backdrop-filter: blur(18px);
    }

    .nav-shell {
      width: min(1240px, calc(100% - 32px));
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 245px;
      gap: 12px;
      cursor: pointer;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(53,245,232,.24);
      border-radius: 12px;
      color: var(--cyan);
      background: linear-gradient(145deg, rgba(53,245,232,.13), rgba(142,108,255,.06));
      box-shadow: 0 0 28px rgba(53,245,232,.15);
      font-size: 20px;
    }

    .brand strong {
      display: block;
      font-family: var(--serif);
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: .02em;
    }

    .brand small { color: var(--muted); font-size: 11px; }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
    }

    .nav-btn, .btn, .mode-btn, .icon-btn {
      border: 1px solid rgba(160,176,218,.17);
      border-radius: 999px;
      background: rgba(21,27,43,.64);
      cursor: pointer;
      transition: border-color .2s, background .2s, color .2s, transform .2s, box-shadow .2s;
    }

    .nav-btn {
      padding: 8px 14px;
      color: #c7cee2;
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .nav-btn:hover, .nav-btn.active {
      color: white;
      border-color: var(--cyan);
      background: rgba(44,65,77,.68);
      box-shadow: 0 0 18px rgba(53,245,232,.17), inset 0 0 10px rgba(53,245,232,.06);
      transform: translateY(-1px);
    }

    main {
      position: relative;
      z-index: 1;
      width: min(1240px, calc(100% - 32px));
      margin: 26px auto 0;
    }

    .overview {
      display: grid;
      grid-template-columns: minmax(0, 2.08fr) minmax(280px, 1fr);
      gap: 18px;
      margin-bottom: 20px;
    }

    .glass {
      border: 1px solid var(--line);
      border-radius: 21px;
      background: linear-gradient(145deg, rgba(17,25,39,.92), rgba(10,17,29,.81));
      box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.02);
    }

    .hero { padding: 22px 24px; }

    .hero h1 {
      margin: 0 0 6px;
      font-family: var(--serif);
      font-size: clamp(40px, 5vw, 61px);
      line-height: 1;
      letter-spacing: -.035em;
    }

    .gradient-word {
      color: transparent;
      background: linear-gradient(90deg, var(--cyan), var(--pink), #ffd883);
      background-clip: text;
      -webkit-background-clip: text;
    }

    .hero-copy { margin: 12px 0 18px; max-width: 820px; color: var(--muted); font-size: 14px; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      min-height: 70px;
      padding: 10px 14px;
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      background: rgba(255,255,255,.025);
    }

    .stat strong, .battle-stat strong {
      display: block;
      color: var(--cyan);
      font-family: var(--serif);
      font-size: 25px;
      line-height: 1.1;
      text-shadow: 0 0 14px rgba(53,245,232,.25);
    }

    .stat span, .battle-stat span { display: block; color: var(--muted); font-size: 12px; }

    .goal {
      padding: 22px;
      background:
        radial-gradient(circle at 90% 5%, rgba(255,35,203,.11), transparent 40%),
        linear-gradient(145deg, rgba(17,25,39,.94), rgba(12,18,31,.82));
    }

    .goal h2 { margin: 0; font-family: var(--serif); font-size: 23px; }
    .goal h2 span { color: var(--pink); margin-right: 7px; }
    .goal p { margin: 8px 0 16px; color: var(--muted); font-size: 13px; }

    .goal-row { display: flex; align-items: center; gap: 10px; }
    .goal-row label { color: var(--muted); font-size: 13px; }

    .goal-input, .spell-input, .game-input, .story-select {
      color: var(--text);
      border: 1px solid rgba(149,165,204,.19);
      outline: none;
      background: rgba(4,8,15,.9);
    }

    .goal-input { width: 80px; padding: 8px 10px; border-radius: 11px; }

    .btn {
      min-height: 36px;
      padding: 8px 14px;
      font-weight: 750;
      font-size: 12px;
    }

    .btn:hover, .mode-btn:hover, .icon-btn:hover { transform: translateY(-1px); filter: brightness(1.12); }
    .btn-cyan { border-color: rgba(53,245,232,.28); background: linear-gradient(135deg, rgba(53,245,232,.22), rgba(106,90,255,.22)); }
    .btn-green { border-color: rgba(104,238,170,.42); background: rgba(45,139,97,.18); }
    .btn-red { border-color: rgba(255,75,121,.38); background: rgba(153,33,72,.18); }
    .btn-ghost { color: #cbd2e6; background: rgba(50,54,77,.35); }

    .progress-label { margin-top: 13px; display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; }
    .progress {
      height: 11px;
      margin-top: 7px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 999px;
      background: rgba(4,8,15,.8);
    }
    .progress > i { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--cyan), #a07aff, var(--pink)); box-shadow: 0 0 14px rgba(255,35,203,.38); transition: width .35s; }

    .bookbar {
      min-height: 78px;
      margin: 0 0 20px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .book-current { min-width: 0; display: flex; align-items: center; gap: 12px; }
    .book-icon { width: 42px; height: 42px; flex: 0 0 auto; display: grid; place-items: center; color: var(--cyan); border: 1px solid var(--line); border-radius: 12px; background: rgba(53,245,232,.06); font-size: 20px; }
    .book-current small { display: block; color: var(--muted); font-size: 11px; }
    .book-current strong { display: inline; font-family: var(--serif); font-size: 17px; }
    .book-current em { margin-left: 8px; color: var(--cyan); font-size: 12px; font-style: normal; }
    .book-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .book-select {
      width: min(330px, 34vw);
      min-height: 38px;
      padding: 8px 34px 8px 12px;
      color: var(--text);
      border: 1px solid rgba(53,245,232,.24);
      border-radius: 11px;
      outline: none;
      background: #0b1320;
      cursor: pointer;
    }
    .book-select:focus { border-color: var(--cyan); box-shadow: 0 0 16px rgba(53,245,232,.13); }
    .book-loading { opacity: .58; pointer-events: none; }

    .section-head {
      min-height: 46px;
      margin: 4px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .section-head h2 { margin: 0; font-family: var(--serif); font-weight: 500; font-size: 28px; }
    .section-head h2 span { color: var(--cyan); font-family: var(--sans); font-size: 22px; }
    .head-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mode-btn { padding: 9px 14px; color: #b9c1da; font-weight: 700; font-size: 12px; }
    .mode-btn.active { color: white; border-color: rgba(53,245,232,.3); background: linear-gradient(145deg, rgba(50,105,122,.65), rgba(68,55,113,.55)); }

    .study-layout { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(340px, .9fr); gap: 18px; }
    .study-card-shell { min-height: 430px; padding: 22px; }
    .flashcard {
      position: relative;
      min-height: 310px;
      padding: 27px;
      overflow: hidden;
      border: 1px solid rgba(53,245,232,.3);
      border-radius: 20px;
      background:
        radial-gradient(circle at 0 0, rgba(53,245,232,.07), transparent 33%),
        rgba(5,12,21,.62);
      cursor: pointer;
      transform-style: preserve-3d;
      transition: border-color .2s, box-shadow .2s, transform .25s;
    }
    .flashcard:hover { border-color: rgba(53,245,232,.55); box-shadow: inset 0 0 38px rgba(53,245,232,.035); }
    .flip-hint { color: var(--muted); font-size: 13px; }
    .word-title { margin: 2px 0 0; font-family: var(--serif); font-size: clamp(47px, 6vw, 73px); line-height: 1.04; word-break: break-word; }
    .phonetic { margin: 4px 0 12px; color: var(--cyan); font-size: 15px; }
    .front-note { margin-top: 10px; color: #aab5d3; font-size: 14px; }
    .answer-stack { display: grid; gap: 10px; margin-top: 11px; }
    .answer-line { padding: 12px 15px; border: 1px solid rgba(160,176,218,.14); border-radius: 12px; background: rgba(255,255,255,.035); color: #e6e9f4; }
    .answer-line b { margin-right: 9px; color: var(--yellow); }
    .card-controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 17px; }

    .today-list { padding: 19px 20px; min-height: 430px; }
    .today-list h3 { margin: 0 0 3px; font-family: var(--serif); font-size: 19px; }
    .today-list h3 span { color: var(--yellow); font-family: var(--sans); margin-right: 6px; }
    .today-list > p { margin: 0 0 15px; color: var(--muted); font-size: 12px; }
    .word-list { display: grid; gap: 7px; max-height: 385px; padding-right: 3px; overflow: auto; scrollbar-width: thin; scrollbar-color: rgba(53,245,232,.35) transparent; }
    .word-row {
      width: 100%;
      padding: 8px 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: white;
      text-align: left;
      border: 1px solid var(--line-soft);
      border-radius: 11px;
      background: rgba(255,255,255,.027);
      cursor: pointer;
    }
    .word-row:hover, .word-row.current { border-color: var(--cyan); box-shadow: 0 0 13px rgba(53,245,232,.13); }
    .word-row strong { display: block; font-family: var(--serif); font-size: 16px; }
    .word-row small { display: block; max-width: 270px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .score-pill { min-width: 29px; height: 24px; padding: 2px 8px; display: grid; place-items: center; border-radius: 999px; color: #061016; background: var(--cyan); font-size: 12px; font-weight: 900; }

    .spell-box { margin-top: 24px; }
    .spell-prompt { min-height: 136px; display: grid; place-items: center; text-align: center; }
    .spell-prompt strong { display: block; color: var(--yellow); font-family: var(--serif); font-size: 25px; }
    .spell-input { width: 100%; margin-top: 14px; padding: 15px 17px; border-radius: 13px; font-size: 17px; }
    .spell-input:focus, .game-input:focus { border-color: var(--cyan); box-shadow: 0 0 18px rgba(53,245,232,.2); }
    .feedback { min-height: 24px; margin-top: 9px; font-weight: 750; font-size: 13px; }
    .feedback.ok { color: var(--green); }
    .feedback.bad { color: var(--red); }

    .quiz-panel { padding: 22px 24px 27px; }
    .quiz-kicker { margin: 0; color: var(--muted); font-size: 13px; }
    .quiz-word { margin: 3px 0 0; font-family: var(--serif); font-size: clamp(46px, 7vw, 74px); line-height: 1.1; word-break: break-word; }
    .options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 13px; margin-top: 20px; }
    .option {
      min-height: 66px;
      padding: 15px;
      color: white;
      text-align: left;
      border: 1px solid rgba(84,203,190,.27);
      border-radius: 13px;
      background: rgba(31,48,59,.52);
      cursor: pointer;
      font-weight: 700;
      transition: .2s;
    }
    .option:hover:not(:disabled) { border-color: var(--cyan); background: rgba(35,75,80,.54); transform: translateY(-1px); }
    .option.correct { border-color: var(--green); background: rgba(35,124,82,.2); box-shadow: 0 0 16px rgba(104,238,170,.12); }
    .option.wrong { border-color: var(--red); background: rgba(142,37,71,.17); }
    .option:disabled { color: #c8cede; cursor: default; }
    .quiz-result { min-height: 28px; margin-top: 13px; font-weight: 800; }

    .wrong-wrap { min-height: 270px; padding: 20px; }
    .wrong-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .wrong-card { padding: 17px; border: 1px solid var(--line-soft); border-radius: 15px; background: var(--panel-2); }
    .wrong-card h3 { margin: 0; color: var(--cyan); font-family: var(--serif); font-size: 20px; }
    .wrong-card .phonetic { margin: 0 0 5px; }
    .wrong-card p { margin: 5px 0; color: #c3cadc; font-size: 13px; }
    .wrong-card b { color: #e8ebf7; }
    .wrong-actions { display: flex; gap: 8px; margin-top: 11px; flex-wrap: wrap; }
    .empty { min-height: 225px; display: grid; place-items: center; text-align: center; color: var(--muted); }
    .empty strong { display: block; margin-bottom: 6px; color: var(--cyan); font-family: var(--serif); font-size: 24px; }

    .game-layout { display: grid; grid-template-columns: minmax(0, 1fr) 280px; gap: 18px; }
    .game-board {
      position: relative;
      height: 500px;
      overflow: hidden;
      border: 1px solid rgba(255,35,203,.52);
      border-radius: 22px;
      background:
        linear-gradient(rgba(74,109,139,.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,109,139,.11) 1px, transparent 1px),
        radial-gradient(circle at 48% 0, rgba(255,35,203,.16), transparent 50%),
        #030912;
      background-size: 42px 42px, 42px 42px, auto, auto;
      box-shadow: 0 0 26px rgba(255,35,203,.22), inset 0 0 34px rgba(255,35,203,.05);
    }
    .falling-word {
      position: absolute;
      left: 20px;
      top: 0;
      padding: 4px 12px;
      border: 1px solid rgba(53,245,232,.34);
      border-radius: 999px;
      color: var(--cyan-2);
      background: rgba(4,10,18,.86);
      box-shadow: 0 0 13px rgba(53,245,232,.18);
      font-family: var(--serif);
      font-size: 19px;
      font-weight: 700;
      white-space: nowrap;
      will-change: transform;
    }
    .game-input { width: 100%; margin-top: 12px; padding: 12px 14px; border-radius: 11px; }
    .battle { padding: 21px; }
    .battle h3 { margin: 0 0 18px; font-family: var(--serif); font-size: 21px; }
    .battle-stats { display: grid; gap: 12px; }
    .battle-stat { min-height: 86px; padding: 16px; border: 1px solid var(--line-soft); border-radius: 14px; background: rgba(255,255,255,.03); }
    .battle p { margin-top: 22px; color: var(--muted); font-size: 13px; }

    .story-panel { padding: 23px; }
    .story-toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .story-select { padding: 9px 12px; border-radius: 11px; }
    .story-title { margin: 28px 0 6px; font-family: var(--serif); font-size: clamp(34px, 5vw, 54px); }
    .story-subtitle { color: var(--muted); font-size: 13px; }
    .story-text { margin-top: 22px; padding: 24px; border: 1px solid var(--line-soft); border-radius: 17px; background: rgba(4,10,18,.56); font-family: var(--serif); font-size: 20px; line-height: 1.9; }
    .story-word { position: relative; color: var(--cyan); border-bottom: 1px dashed var(--cyan); cursor: help; }
    .story-word:hover::after {
      content: attr(data-tip);
      position: absolute;
      z-index: 6;
      left: 50%;
      bottom: calc(100% + 9px);
      width: max-content;
      max-width: 260px;
      padding: 7px 10px;
      color: white;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #101827;
      font: 12px/1.45 var(--sans);
      transform: translateX(-50%);
      box-shadow: var(--shadow);
    }
    .story-vocab { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 9px; margin-top: 16px; }
    .story-vocab button { padding: 11px; color: var(--cyan); border: 1px solid var(--line-soft); border-radius: 11px; background: rgba(255,255,255,.025); cursor: pointer; font-family: var(--serif); font-weight: 700; }

    .toast {
      position: fixed;
      z-index: 100;
      left: 50%;
      bottom: 28px;
      max-width: calc(100% - 32px);
      padding: 10px 17px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(8,15,25,.96);
      box-shadow: 0 0 24px rgba(53,245,232,.14);
      font-weight: 750;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 14px);
      transition: .25s;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .celebration {
      position: fixed;
      z-index: 120;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      pointer-events: none;
      background: radial-gradient(circle, rgba(53,245,232,.1), transparent 48%);
      animation: celebrationFade 2.4s both;
    }
    .celebration strong {
      padding: 16px 24px;
      color: white;
      border: 1px solid var(--cyan);
      border-radius: 999px;
      background: rgba(6,13,23,.92);
      box-shadow: 0 0 45px rgba(53,245,232,.34), 0 0 75px rgba(255,35,203,.2);
      font-family: var(--serif);
      font-size: clamp(22px,5vw,42px);
      animation: goalPop .55s both;
    }
    .celebration i { position: absolute; top: 48%; color: var(--cyan); font-style: normal; animation: confettiBurst 1.5s ease-out both; }
    @keyframes goalPop { from { opacity: 0; transform: scale(.65); } to { opacity: 1; transform: scale(1); } }
    @keyframes celebrationFade { 0%,75% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes confettiBurst { from { opacity: 1; transform: translate(0,0) rotate(0); } to { opacity: 0; transform: translate(var(--x),var(--y)) rotate(540deg); } }

    footer { padding: 34px 0 28px; color: #747e9b; text-align: center; font-size: 11px; }

    @media (max-width: 920px) {
      .topbar { height: auto; }
      .nav-shell { padding: 12px 0; align-items: flex-start; }
      .brand { min-width: 0; }
      .brand small { display: none; }
      .nav-links { max-width: 470px; overflow-x: auto; justify-content: flex-start; padding-bottom: 2px; }
      .nav-btn { padding: 8px 11px; }
      .overview, .study-layout, .game-layout { grid-template-columns: 1fr; }
      .bookbar { align-items: flex-start; flex-direction: column; }
      .book-actions { width: 100%; justify-content: flex-start; }
      .book-select { width: min(100%, 420px); }
      .wrong-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .story-vocab { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .battle-stats { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .battle-stat { min-height: 72px; }
    }

    @media (max-width: 640px) {
      .nav-shell { width: min(100% - 20px, 1240px); display: block; }
      .brand { margin-bottom: 10px; }
      .nav-links { max-width: 100%; }
      main { width: calc(100% - 20px); margin-top: 14px; }
      .hero, .goal, .quiz-panel, .story-panel { padding: 18px; }
      .hero h1 { font-size: 39px; }
      .overview { gap: 11px; }
      .bookbar { padding: 14px; }
      .book-actions { display: grid; grid-template-columns: 1fr 1fr; }
      .book-select { width: 100%; grid-column: 1 / -1; }
      .section-head { align-items: flex-start; flex-direction: column; }
      .head-actions { justify-content: flex-start; }
      .study-card-shell { min-height: 0; padding: 12px; }
      .flashcard { min-height: 300px; padding: 19px; }
      .word-title { font-size: 46px; }
      .today-list { min-height: 0; }
      .options, .wrong-grid { grid-template-columns: 1fr; }
      .game-board { height: 420px; }
      .battle-stats { grid-template-columns: 1fr; }
      .story-vocab { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }

    /* ──────────────────────────────────────────────────────────
       Minimal white glass theme — layout only, feature logic unchanged
       ────────────────────────────────────────────────────────── */
    :root {
      --bg: #f3f6fb;
      --panel: rgba(255, 255, 255, .76);
      --panel-2: rgba(255, 255, 255, .9);
      --line: rgba(95, 118, 153, .16);
      --line-soft: rgba(95, 118, 153, .11);
      --cyan: #4169e1;
      --cyan-2: #3157cf;
      --pink: #9673e8;
      --violet: #7658d7;
      --red: #de5c72;
      --green: #28a879;
      --yellow: #a47921;
      --text: #182338;
      --muted: #66748c;
      --shadow: 0 24px 64px rgba(31, 48, 78, .10), 0 4px 18px rgba(31, 48, 78, .055);
    }

    body {
      color: var(--text);
      background:
        radial-gradient(circle at 5% 4%, rgba(145, 178, 255, .24), transparent 28%),
        radial-gradient(circle at 96% 12%, rgba(216, 194, 255, .22), transparent 30%),
        radial-gradient(circle at 55% 96%, rgba(185, 224, 239, .20), transparent 32%),
        linear-gradient(145deg, #f8faff 0%, #f2f5fa 56%, #edf2f8 100%);
      font-size: 16px;
    }

    body::before {
      opacity: .7;
      background-image:
        linear-gradient(rgba(70, 91, 125, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(70, 91, 125, .025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, black, transparent 92%);
    }

    ::selection { color: #fff; background: #5f7ee3; }

    .topbar {
      height: 88px;
      border-bottom: 1px solid rgba(255,255,255,.85);
      background: rgba(255,255,255,.68);
      box-shadow: 0 8px 30px rgba(38,55,82,.07);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
    }

    .nav-shell {
      width: 100%;
      max-width: none;
      padding: 0 clamp(24px, 4vw, 72px);
      align-items: center;
    }

    .brand { min-width: 290px; gap: 14px; }
    .brand-mark {
      width: 48px;
      height: 48px;
      color: #4767c8;
      border: 1px solid rgba(255,255,255,.95);
      border-radius: 15px;
      background: linear-gradient(145deg, rgba(255,255,255,.96), rgba(234,240,252,.78));
      box-shadow: 0 12px 28px rgba(48,73,119,.12), inset 0 1px rgba(255,255,255,1);
    }
    .brand strong { color: #172238; font-size: 22px; letter-spacing: -.01em; }
    .brand small { display: block; color: #8290a5; font-size: 11px; letter-spacing: .03em; }

    .nav-links { max-width: none; gap: 8px; overflow: visible; }
    .nav-btn {
      padding: 10px 17px;
      color: #5d6a80;
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }
    .nav-btn:hover, .nav-btn.active {
      color: #27479f;
      border-color: rgba(91,119,203,.14);
      background: rgba(255,255,255,.82);
      box-shadow: 0 9px 24px rgba(43,66,105,.09), inset 0 0 0 1px rgba(255,255,255,.6);
    }

    .mobile-menu-toggle, .mobile-nav-head, .nav-backdrop { display: none; }

    main {
      width: 100%;
      max-width: none;
      min-height: calc(100vh - 88px);
      margin: 0;
      padding: clamp(24px, 3.2vw, 52px) clamp(24px, 4vw, 72px) 0;
    }

    .overview {
      grid-template-columns: minmax(0, 1.8fr) minmax(340px, .78fr);
      gap: clamp(18px, 2vw, 30px);
      margin-bottom: 24px;
      align-items: stretch;
    }

    .glass {
      border: 1px solid rgba(255,255,255,.92);
      background: rgba(255,255,255,.70);
      box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.92);
      backdrop-filter: blur(22px) saturate(135%);
      -webkit-backdrop-filter: blur(22px) saturate(135%);
    }

    .hero {
      min-height: 375px;
      padding: clamp(30px, 3.3vw, 52px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .hero h1 { color: #162238; font-size: clamp(52px, 5.1vw, 86px); letter-spacing: -.045em; }
    .gradient-word {
      background: linear-gradient(90deg, #315acb, #7395ea 48%, #8466c9);
      background-clip: text;
      -webkit-background-clip: text;
    }
    .hero-copy { max-width: 1050px; margin: 18px 0 28px; color: #66758c; font-size: clamp(14px, 1vw, 17px); line-height: 1.85; }

    .stat-grid { gap: 14px; }
    .stat {
      min-height: 86px;
      padding: 16px 18px;
      border-color: rgba(107,128,164,.12);
      background: rgba(255,255,255,.76);
      box-shadow: 0 10px 26px rgba(41,60,91,.055), inset 0 1px rgba(255,255,255,.9);
    }
    .stat strong, .battle-stat strong { color: #3458bd; font-size: 30px; text-shadow: none; }
    .stat span, .battle-stat span { margin-top: 3px; color: #77849a; }

    .goal {
      min-height: 375px;
      padding: clamp(28px, 2.8vw, 42px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(145deg, rgba(255,255,255,.80), rgba(245,247,255,.68));

    .goal h2 span { color: #8064d1; }
    .goal p { margin: 12px 0 24px; color: var(--muted); font-size: 14px; }
    .goal-input, .spell-input, .game-input, .story-select {
      color: #243149;
      border-color: rgba(93,117,158,.18);
      background: rgba(255,255,255,.82);
      box-shadow: inset 0 1px 3px rgba(42,59,88,.05);
    }
    .goal-input { min-height: 42px; }
    .progress { height: 12px; border-color: rgba(85,109,149,.08); background: rgba(102,121,153,.11); }
    .progress > i { background: linear-gradient(90deg, #6e8ee8, #9e83dd); box-shadow: none; }

    .bookbar {
      min-height: 92px;
      margin-bottom: 30px;
      padding: 18px 24px;
      background: rgba(255,255,255,.62);
    }
    .book-icon { color: #4866bd; border-color: rgba(95,119,165,.13); background: rgba(255,255,255,.72); box-shadow: 0 9px 20px rgba(42,59,88,.07); }
    .book-current strong { color: #243149; font-size: 19px; }
    .book-current em { color: #526fc7; }
    .book-select { color: #26334b; border-color: rgba(86,110,152,.18); background: rgba(255,255,255,.9); box-shadow: 0 7px 18px rgba(39,56,84,.055); }

    .section-head { min-height: 58px; margin: 10px 0 16px; }
    .section-head h2 { color: #1d2940; font-size: clamp(28px, 2.3vw, 38px); font-weight: 600; }
    .section-head h2 span { color: #5974c8; }

    .nav-btn, .btn, .mode-btn, .icon-btn { border-color: rgba(89,111,151,.14); background: rgba(255,255,255,.70); }
    .btn, .mode-btn { min-height: 42px; padding: 10px 17px; color: #516078; }
    .btn-cyan { color: #fff; border-color: #5674cf; background: linear-gradient(135deg, #6c88dc, #765fc2); box-shadow: 0 9px 22px rgba(82,100,181,.20); }
    .btn-green { color: #187855; border-color: rgba(40,168,121,.22); background: rgba(224,246,238,.86); }
    .btn-red { color: #b6485c; border-color: rgba(222,92,114,.18); background: rgba(255,235,239,.88); }
    .btn-ghost { color: #56647b; background: rgba(255,255,255,.68); }
    .mode-btn.active { color: #314fa9; border-color: rgba(72,99,181,.18); background: rgba(235,240,255,.92); box-shadow: 0 8px 20px rgba(54,75,121,.08); }

    .study-layout { grid-template-columns: minmax(0, 1.35fr) minmax(400px, .65fr); gap: clamp(18px, 2vw, 30px); }
    .study-card-shell, .today-list { min-height: 570px; }
    .study-card-shell { padding: clamp(18px, 2vw, 30px); }
    .flashcard {
      min-height: 430px;
      padding: clamp(28px, 3vw, 46px);
      border-color: rgba(87,112,155,.16);
      background: linear-gradient(145deg, rgba(255,255,255,.96), rgba(246,249,254,.84));
      box-shadow: 0 20px 45px rgba(39,57,86,.075), inset 0 1px rgba(255,255,255,1);
    }
    .flashcard:hover { border-color: rgba(76,104,180,.30); box-shadow: 0 22px 50px rgba(39,57,86,.10); }
    .flashcard[data-flipped="true"] { align-items: stretch; justify-content: flex-start; max-height: 68vh; overflow: auto; }
    .flip-hint, .front-note { color: #748198; }
    .word-title { color: #182338; font-size: clamp(64px, 6.5vw, 104px); }
    .phonetic { color: #4969c4; }
    .answer-line { color: #354157; border-color: rgba(89,112,150,.11); background: rgba(245,248,253,.82); }
    .answer-line b { color: #8c6926; }
    .rich-details { display: grid; gap: 12px; margin-top: 18px; text-align: left; }
    .detail-section { padding: 15px 17px; border: 1px solid rgba(89,112,150,.11); border-radius: 15px; color: #354157; background: rgba(245,248,253,.82); }
    .detail-section h4 { margin: 0 0 7px; color: #8c6926; font-size: 13px; font-weight: 750; letter-spacing: .06em; text-transform: uppercase; }
    .detail-section p { margin: 5px 0; line-height: 1.65; white-space: pre-wrap; }
    .detail-section .detail-translation { color: #66748a; }
    .detail-pos { display: inline-block; margin-right: 7px; padding: 2px 7px; border-radius: 999px; color: #4d67b4; background: rgba(225,232,252,.9); font-size: 11px; font-weight: 700; }
    .detail-source { color: #7c8799; font-size: 12px; }
    .card-controls { margin-top: 22px; }

    .today-list { padding: 25px; }
    .today-list h3 { color: #243149; font-size: 22px; }
    .today-list h3 span { color: #977328; }
    .word-list { max-height: 500px; scrollbar-color: rgba(86,111,180,.35) transparent; }
    .word-row { padding: 11px 13px; color: #27334a; border-color: rgba(88,109,145,.11); background: rgba(255,255,255,.70); }
    .word-row:hover, .word-row.current { border-color: rgba(70,97,174,.34); background: rgba(242,246,255,.96); box-shadow: 0 8px 20px rgba(42,59,90,.07); }
    .score-pill { color: #fff; background: #6c82cc; }
    .score-pill.learned { background: #38a77b; }
    .daily-add-panel { margin-top: 15px; padding: 15px; border: 1px solid rgba(72,99,181,.13); border-radius: 16px; background: rgba(242,246,255,.82); }
    .daily-add-panel strong { display: block; color: #263653; font-size: 15px; }
    .daily-add-panel p { margin: 5px 0 12px; color: #6c7890; font-size: 12px; line-height: 1.55; }
    .daily-add-row { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; }
    .daily-add-row input { min-width: 0; min-height: 42px; padding: 9px 12px; color: #28364f; border: 1px solid rgba(86,110,152,.18); border-radius: 12px; background: rgba(255,255,255,.92); font: inherit; }
    .list-context { display: inline-flex; margin-left: 7px; padding: 3px 8px; border-radius: 999px; color: #4f68b3; background: rgba(229,235,253,.9); font-family: var(--sans); font-size: 11px; vertical-align: middle; }

    .spell-prompt strong { color: #5c4b8d; font-size: 32px; }
    .spell-input, .game-input { min-height: 54px; font-size: 17px; }
    .spell-input:focus, .game-input:focus { border-color: #6e89da; box-shadow: 0 0 0 4px rgba(91,120,208,.12); }

    .quiz-panel { min-height: 470px; padding: clamp(28px, 3vw, 48px); }
    .quiz-word { color: #182338; font-size: clamp(62px, 7vw, 110px); }
    .option { min-height: 78px; padding: 20px; color: #344158; border-color: rgba(83,109,148,.16); background: rgba(255,255,255,.76); box-shadow: 0 8px 20px rgba(42,59,87,.045); }
    .option:hover:not(:disabled) { border-color: rgba(74,102,181,.34); background: rgba(242,246,255,.98); }
    .option.correct { border-color: rgba(40,168,121,.35); background: rgba(229,248,240,.94); }
    .option.wrong { border-color: rgba(222,92,114,.30); background: rgba(255,237,241,.94); }
    .option:disabled { color: #67738a; }
    .quiz-scope-bar { margin-bottom: 20px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; gap: 14px; border: 1px solid rgba(83,109,148,.12); border-radius: 17px; background: rgba(255,255,255,.66); }
    .quiz-scope-copy strong { display: block; color: #263653; }
    .quiz-scope-copy span { display: block; margin-top: 3px; color: #718097; font-size: 12px; }
    .quiz-scope-actions { display: flex; flex-wrap: wrap; gap: 7px; }

    .calendar-layout { display: grid; grid-template-columns: minmax(0,1.35fr) minmax(320px,.65fr); gap: 24px; }
    .calendar-panel, .calendar-detail { padding: clamp(20px,2.5vw,32px); }
    .calendar-toolbar { margin-bottom: 19px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .calendar-toolbar h3 { margin: 0; color: #223049; font-family: var(--serif); font-size: 28px; }
    .calendar-toolbar div { display: flex; gap: 7px; }
    .calendar-weekdays, .calendar-grid { display: grid; grid-template-columns: repeat(7,minmax(0,1fr)); gap: 8px; }
    .calendar-weekdays { margin-bottom: 8px; color: #8490a3; text-align: center; font-size: 12px; font-weight: 750; }
    .calendar-day { min-height: 78px; padding: 9px; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-between; color: #354158; border: 1px solid rgba(85,109,149,.11); border-radius: 14px; background: rgba(255,255,255,.66); cursor: pointer; }
    .calendar-day:hover, .calendar-day.selected { border-color: rgba(70,97,174,.35); background: rgba(240,245,255,.98); box-shadow: 0 8px 20px rgba(42,59,90,.07); }
    .calendar-day.today > strong { color: #4968c3; }
    .calendar-day.has-study { background: linear-gradient(145deg,rgba(239,244,255,.98),rgba(248,245,255,.92)); }
    .calendar-day strong { font-size: 14px; }
    .calendar-day small { color: #5571c7; font-size: 10px; font-weight: 750; }
    .calendar-blank { min-height: 78px; }
    .calendar-detail h3 { margin: 0; color: #223049; font-family: var(--serif); font-size: 25px; }
    .calendar-detail > p { color: #718097; line-height: 1.65; }
    .calendar-word-list { max-height: 430px; margin: 18px 0; display: grid; gap: 8px; overflow: auto; }
    .calendar-word { padding: 11px 13px; display: flex; align-items: center; justify-content: space-between; gap: 12px; color: #2e3a51; border: 1px solid rgba(85,109,149,.10); border-radius: 13px; background: rgba(255,255,255,.7); }
    .calendar-word span { color: #778399; font-size: 12px; text-align: right; }

    .learned-manager { padding: clamp(20px,2.6vw,34px); }
    .learned-summary { margin-bottom: 20px; display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 12px; }
    .learned-stat { padding: 17px 19px; border: 1px solid rgba(85,109,149,.11); border-radius: 16px; background: rgba(255,255,255,.7); }
    .learned-stat strong { display: block; color: #263b70; font-family: var(--serif); font-size: 31px; }
    .learned-stat span { color: #748097; font-size: 12px; }
    .learned-toolbar { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .learned-filters { display: flex; flex-wrap: wrap; gap: 7px; }
    .learned-search { min-width: min(330px,100%); display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 7px; }
    .learned-search input { min-width: 0; min-height: 42px; padding: 10px 13px; color: #28364f; border: 1px solid rgba(86,110,152,.18); border-radius: 12px; background: rgba(255,255,255,.9); font: inherit; }
    .learned-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(300px,1fr)); gap: 15px; }
    .learned-card { padding: 19px; border: 1px solid rgba(85,109,149,.11); border-radius: 18px; background: rgba(255,255,255,.76); box-shadow: 0 9px 24px rgba(40,57,87,.05); }
    .learned-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .learned-card h3 { margin: 0; color: #2e51af; font-family: var(--serif); font-size: 25px; }
    .learned-card .phonetic { margin: 3px 0 0; font-size: 12px; }
    .review-state { flex: 0 0 auto; padding: 5px 9px; border-radius: 999px; color: #9d4c5e; background: rgba(255,232,238,.92); font-size: 11px; font-weight: 800; }
    .review-state.mastered { color: #197552; background: rgba(224,246,238,.94); }
    .learned-meaning { min-height: 42px; margin: 13px 0; color: #4d5a70; line-height: 1.55; }
    .familiarity-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: #66748b; font-size: 12px; }
    .familiarity-track { height: 8px; margin: 7px 0 11px; overflow: hidden; border-radius: 999px; background: rgba(98,119,153,.12); }
    .familiarity-track i { height: 100%; display: block; border-radius: inherit; background: linear-gradient(90deg,#8099e3,#62b58e); }
    .learned-meta { color: #7b879a; font-size: 11px; }
    .learned-details { margin-top: 13px; border-top: 1px solid rgba(85,109,149,.10); }
    .learned-details summary { padding: 12px 0 4px; color: #536ab0; cursor: pointer; font-size: 12px; font-weight: 750; }
    .learned-card-actions { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .learned-card-actions .btn:last-child:nth-child(odd) { grid-column: 1 / -1; }
    .learned-pagination { margin-top: 22px; display: flex; align-items: center; justify-content: center; gap: 12px; color: #718097; font-size: 12px; }

    .wrong-wrap { min-height: 420px; padding: 28px; }
    .wrong-grid { grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; }
    .wrong-card { padding: 22px; border-color: rgba(88,110,148,.11); background: rgba(255,255,255,.78); box-shadow: 0 10px 26px rgba(39,57,86,.06); }
    .wrong-card h3 { color: #3457b6; }
    .wrong-card p { color: #56637a; }
    .wrong-card b { color: #2c384f; }
    .wrong-card .rich-details { gap: 8px; margin-top: 12px; }
    .wrong-card .detail-section { padding: 11px 12px; }

    .game-layout { grid-template-columns: minmax(0, 1fr) 330px; gap: 24px; }
    .game-board {
      height: min(610px, 65vh);
      min-height: 500px;
      border-color: rgba(107,91,188,.20);
      background:
        linear-gradient(rgba(86,108,149,.075) 1px, transparent 1px),
        linear-gradient(90deg, rgba(86,108,149,.075) 1px, transparent 1px),
        radial-gradient(circle at 50% 0, rgba(170,150,229,.14), transparent 50%),
        rgba(255,255,255,.73);
      background-size: 44px 44px, 44px 44px, auto, auto;
      box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.9);
    }
    .falling-word { color: #3156b4; border-color: rgba(75,105,190,.20); background: rgba(255,255,255,.92); box-shadow: 0 8px 20px rgba(49,73,119,.12); }
    .battle { padding: 26px; }
    .battle h3 { color: #253149; font-size: 24px; }
    .battle-stat { border-color: rgba(85,108,148,.10); background: rgba(255,255,255,.72); }
    .battle p { color: #68768d; }

    .story-panel { min-height: 520px; padding: clamp(28px, 3vw, 48px); }
    .story-title { color: #1d2940; }
    .story-text { color: #354158; border-color: rgba(88,111,150,.11); background: rgba(255,255,255,.68); }
    .story-word { color: #3d61c1; border-color: #5e7bd2; }
    .story-word:hover::after { color: #fff; border-color: rgba(255,255,255,.2); background: #26344d; }
    .story-vocab button { color: #3e5eb5; border-color: rgba(85,107,146,.12); background: rgba(255,255,255,.76); }

    .toast { color: #28344b; border-color: rgba(255,255,255,.95); background: rgba(255,255,255,.92); box-shadow: 0 18px 45px rgba(35,51,78,.15); }
    .empty strong { color: #4261b7; }
    footer { color: #8793a6; padding: 46px 0 32px; }

    button:focus-visible, input:focus-visible, select:focus-visible, [role="button"]:focus-visible {
      outline: 3px solid rgba(85,116,210,.22);
      outline-offset: 3px;
    }

    @media (max-width: 1100px) {
      .overview { grid-template-columns: 1.35fr .8fr; }
      .hero h1 { font-size: clamp(48px, 6vw, 68px); }
      .study-layout { grid-template-columns: 1fr 390px; }
      .nav-btn { padding-inline: 12px; }
    }

    @media (max-width: 920px) {
      .overview, .study-layout, .game-layout, .calendar-layout { grid-template-columns: 1fr; }
      .hero, .goal { min-height: auto; }
      .goal { padding-block: 32px; }
      .study-card-shell, .today-list { min-height: auto; }
      .game-board { height: 520px; min-height: 420px; }
      .battle-stats { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .brand { min-width: 245px; }
    }

    @media (max-width: 760px) {
      body.nav-open { overflow: hidden; }
      .topbar { height: 72px; backdrop-filter: none; -webkit-backdrop-filter: none; }
      .nav-shell { height: 72px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; }
      .brand { min-width: 0; margin: 0; gap: 10px; }
      .brand-mark { width: 42px; height: 42px; border-radius: 13px; }
      .brand strong { font-size: 19px; }
      .brand small { display: none; }

      .mobile-menu-toggle {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        color: #35445e;
        border: 1px solid rgba(80,104,146,.14);
        border-radius: 13px;
        background: rgba(255,255,255,.82);
        box-shadow: 0 8px 20px rgba(40,57,87,.08);
        font-size: 21px;
        cursor: pointer;
      }

      .nav-links {

  <script>
    const curatedWords = [
      {word:'tally', phonetic:'/ˈtæli/', zh:'计数；记录；总数', en:'a current score or amount', example:'Keep a tally of every word you master.', memory:'tally 与 total 都和总数有关。'},
      {word:'associative', phonetic:'/əˈsoʊʃiətɪv/', zh:'联想的；关联的', en:'connected with the association of ideas', example:'Associative learning connects a new word with an image.', memory:'associate（联想）+ ive（形容词后缀）。'},
      {word:'recalcitrant', phonetic:'/rɪˈkælsɪtrənt/', zh:'顽抗的；倔强不服从的', en:'unwilling to obey rules or authority', example:'The recalcitrant student refused to follow the simple rule.', memory:'re + calc（脚跟）→ 踢脚反抗 → 顽抗。'},
      {word:'tenacity', phonetic:'/təˈnæsəti/', zh:'韧性；坚持不懈', en:'the quality of being determined', example:'Her tenacity helped her finish the difficult project.', memory:'tenacious 的名词形式。'},
      {word:'analogy', phonetic:'/əˈnælədʒi/', zh:'类比', en:'a comparison between similar things', example:'The teacher used an analogy to explain the concept.', memory:'ana（相同）+ log（说、推理）→ 类比。'},
      {word:'tractability', phonetic:'/ˌtræktəˈbɪləti/', zh:'易处理；温顺', en:'the quality of being easy to control', example:'The plan succeeded because of its tractability.', memory:'tract（拉）+ able → 拉得动、易控制。'},
      {word:'temperance', phonetic:'/ˈtempərəns/', zh:'节制；自我克制', en:'restraint in action or feeling', example:'Temperance is often praised as a personal virtue.', memory:'temperate 的名词形式，就是 temperance。'},
      {word:'legitimate', phonetic:'/lɪˈdʒɪtɪmət/', zh:'合法的；合理的', en:'allowed by law or reasonable', example:'She raised a legitimate concern about the proposal.', memory:'leg（法律）+ itimate → 合法的。'},
      {word:'accentuate', phonetic:'/ækˈsentʃueɪt/', zh:'强调；突出', en:'to emphasize or make more noticeable', example:'The lighting can accentuate the texture of the wall.', memory:'accent（重音）→ 加重语气 → 强调。'},
      {word:'unconventional', phonetic:'/ˌʌnkənˈvenʃənl/', zh:'非传统的；不寻常的', en:'different from what is usual', example:'Her unconventional solution surprised the judges.', memory:'un（不）+ conventional（传统的）。'},
      {word:'pragmatically', phonetic:'/præɡˈmætɪkli/', zh:'务实地；实际地', en:'in a practical and realistic way', example:'They approached the issue pragmatically.', memory:'pragmatic 是务实的，pragmatically 就是务实地。'},
      {word:'aberration', phonetic:'/ˌæbəˈreɪʃn/', zh:'偏差；异常；越轨', en:'a departure from what is normal', example:'The poor result was an aberration in an excellent season.', memory:'ab（离开）+ err（错误）→ 偏离正常。'},
      {word:'redress', phonetic:'/rɪˈdres/', zh:'纠正；补救', en:'to remedy or set right', example:'The policy attempts to redress the imbalance.', memory:'re（重新）+ dress（整理）→ 重新整理、纠正。'},
      {word:'admittedly', phonetic:'/ədˈmɪtɪdli/', zh:'无可否认地；诚然', en:'as must be acknowledged', example:'Admittedly, the first attempt was not perfect.', memory:'admit（承认）+ tedly。'},
      {word:'mastery', phonetic:'/ˈmæstəri/', zh:'精通；掌握', en:'complete command of a subject', example:'Daily practice leads to mastery.', memory:'master（掌握）+ y（名词后缀）。'},
      {word:'unmistakable', phonetic:'/ˌʌnmɪˈsteɪkəbl/', zh:'不容置疑的；明显的', en:'not able to be mistaken', example:'There was an unmistakable note of excitement in her voice.', memory:'un + mistake + able。'},
      {word:'oddity', phonetic:'/ˈɑːdəti/', zh:'奇怪的事物；怪人；怪现象', en:'a strange person, thing, or event', example:'The tiny door was an architectural oddity.', memory:'odd（奇怪的）+ ity。'},
      {word:'derivatively', phonetic:'/dɪˈrɪvətɪvli/', zh:'派生地；衍生地', en:'in a derived manner', example:'The term is used derivatively in modern criticism.', memory:'derive → derivative → derivatively。'},
      {word:'belligerent', phonetic:'/bəˈlɪdʒərənt/', zh:'好战的；挑衅的', en:'hostile and aggressive', example:'His belligerent tone made agreement difficult.', memory:'bell（战争）+ ger（携带）→ 带来战争。'},
      {word:'altruistic', phonetic:'/ˌæltruˈɪstɪk/', zh:'利他的；无私的', en:'showing concern for others', example:'Her altruistic decision benefited the whole community.', memory:'alter（他人）→ 为他人着想。'},
      {word:'deferential', phonetic:'/ˌdefəˈrenʃl/', zh:'恭敬的；顺从的', en:'showing respect', example:'He remained deferential to the senior researcher.', memory:'defer（尊重、遵从）+ ential。'},
      {word:'disapproving', phonetic:'/ˌdɪsəˈpruːvɪŋ/', zh:'不赞成的', en:'showing an unfavorable opinion', example:'She gave him a disapproving glance.', memory:'dis（否定）+ approving（赞同的）。'},
      {word:'assuagement', phonetic:'/əˈsweɪdʒmənt/', zh:'缓和；减轻', en:'the act of making something less severe', example:'Music brought some assuagement of his anxiety.', memory:'assuage（缓和）+ ment。'},
      {word:'derivative', phonetic:'/dɪˈrɪvətɪv/', zh:'派生的；衍生物', en:'copied or developed from something else', example:'The design felt derivative rather than original.', memory:'derive（得到、派生）+ ative。'},
      {word:'resilient', phonetic:'/rɪˈzɪliənt/', zh:'有韧性的；能复原的', en:'able to recover quickly', example:'Resilient people adapt after setbacks.', memory:'re（回）+ sil（跳）→ 弹回来。'},
      {word:'meticulous', phonetic:'/məˈtɪkjələs/', zh:'一丝不苟的；细致的', en:'very careful about details', example:'She kept meticulous notes throughout the experiment.', memory:'对每个细小细节都非常在意。'},
      {word:'ephemeral', phonetic:'/ɪˈfemərəl/', zh:'短暂的；瞬息的', en:'lasting for a very short time', example:'Online fame can be ephemeral.', memory:'像蜉蝣一样只有短暂生命。'},
      {word:'ubiquitous', phonetic:'/juːˈbɪkwɪtəs/', zh:'无处不在的', en:'present or found everywhere', example:'Smartphones have become ubiquitous.', memory:'ubi（哪里）→ 哪里都有。'},
      {word:'ameliorate', phonetic:'/əˈmiːliəreɪt/', zh:'改善；改进', en:'to make something better', example:'The reform should ameliorate working conditions.', memory:'melior（更好）→ 变得更好。'},
      {word:'equivocal', phonetic:'/ɪˈkwɪvəkl/', zh:'模棱两可的', en:'open to more than one interpretation', example:'The witness gave an equivocal reply.', memory:'equi（相等）+ voc（声音）→ 两种说法一样。'},
      {word:'magnanimous', phonetic:'/mæɡˈnænɪməs/', zh:'宽宏大量的', en:'generous and forgiving', example:'She was magnanimous in victory.', memory:'magn（大）+ anim（心灵）→ 心胸大。'},
      {word:'lucid', phonetic:'/ˈluːsɪd/', zh:'清晰的；易懂的', en:'clear and easy to understand', example:'His lucid explanation clarified the issue.', memory:'luc（光）→ 有光就清楚。'}
    ];

    const STORE_KEY = 'sat-conqueror-state-v1';
    const DEFAULT_BOOK_ID = 'builtin:sat-yu-minhong';
    const DEFAULT_BOOK_URL = './word_list/SAT词汇词根 联想记忆法(乱序版) (俞敏洪).json';
    const BUNDLED_BOOKS = [
      {id:DEFAULT_BOOK_ID, name:'SAT词汇词根+联想记忆法（乱序版）', url:DEFAULT_BOOK_URL, source:'builtin'},
      {name:'SAT 400词：例句、同义词与反义词', url:'./word_list/400词含例句同反义词.json', bundledKey:'400词含例句同反义词.json', offlineUrl:'./word_list/400词含例句同反义词.offline.js'},
      {name:'机考SAT真题词汇2000（Day 1–10）', url:'./word_list/机考SAT真题词汇2000_Day1-10.json', bundledKey:'机考SAT真题词汇2000_Day1-10.json', offlineUrl:'./word_list/机考SAT真题词汇2000_Day1-10.offline.js'},
      {name:'机考SAT真题词汇2000（Day 11–20）', url:'./word_list/机考SAT真题词汇2000_Day11-20.json', bundledKey:'机考SAT真题词汇2000_Day11-20.json', offlineUrl:'./word_list/机考SAT真题词汇2000_Day11-20.offline.js'},
      {name:'机考SAT真题词汇2000（Day 21–26）', url:'./word_list/机考SAT真题词汇2000_Day21-26.json', bundledKey:'机考SAT真题词汇2000_Day21-26.json', offlineUrl:'./word_list/机考SAT真题词汇2000_Day21-26.offline.js'}
    ].map(book => book.id ? book : {...book, id:`url:${new URL(book.url, location.href).href}`, source:'url'});
    const TODAY_KEY = new Date().toLocaleDateString('en-CA');
    const saved = (() => { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; } })();
    const legacySession = {
      scores: saved.scores || {},
      wrong: Array.isArray(saved.wrong) ? saved.wrong : [],
      current: Number(saved.current) || 0,
      order: Array.isArray(saved.order) ? saved.order : [],
      orderScope: 'all'
    };
    const savedSessions = saved.bookSessions && typeof saved.bookSessions === 'object' ? saved.bookSessions : {[DEFAULT_BOOK_ID]: legacySession};
    const savedBookId = saved.activeBookId || DEFAULT_BOOK_ID;
    const activeSession = savedSessions[savedBookId] || {scores:{}, wrong:[], learned:[], dailyPlans:{}, reviewPreferences:{}, current:0, order:[], orderScope:'today'};
    const migratedLearned = Array.isArray(activeSession.learned)
      ? activeSession.learned
      : Object.keys(activeSession.scores || {}).filter(key => Number(activeSession.scores[key]) !== 0);
    const state = {
      view: location.hash.replace('#','') || 'learn',
      mode: saved.mode || 'card',
      dailyGoal: Number(saved.dailyGoal) || 7,
      todayCount: saved.day === TODAY_KEY ? (Number(saved.todayCount) || 0) : 0,
      activeBookId: savedBookId,
      activeBookName: saved.activeBookName || 'SAT词汇词根+联想记忆法（乱序版）',
      bookSessions: savedSessions,
      scores: activeSession.scores || {},
      wrong: Array.isArray(activeSession.wrong) ? activeSession.wrong : [],
      learned: migratedLearned,
      dailyPlans: activeSession.dailyPlans && typeof activeSession.dailyPlans === 'object' ? activeSession.dailyPlans : {},
      reviewPreferences: activeSession.reviewPreferences && typeof activeSession.reviewPreferences === 'object' ? activeSession.reviewPreferences : {},
      current: Number(activeSession.current) || 0,
      order: Array.isArray(activeSession.order) ? activeSession.order : [],
      orderScope: ['today','wrong','calendar','manual'].includes(activeSession.orderScope) ? activeSession.orderScope : 'today',
      reviewDate: activeSession.reviewDate || null,
      quiz: null,
      quizScope: saved.quizScope === 'previous' ? 'previous' : 'today',
      learnedFilter: 'all',
      learnedQuery: '',
      learnedPage: 0,
      calendarMonth: TODAY_KEY.slice(0,7),
      selectedCalendarDate: TODAY_KEY,
      storySeed: Number(saved.storySeed) || 0
    };

    const offlineImported = Array.isArray(window.__SAT_IMPORTED_WORDS__) ? window.__SAT_IMPORTED_WORDS__ : [];
    const offlineBookLoads = new Map();
    let library = offlineImported.length ? normalizeWords(offlineImported) : [...curatedWords];
    let bookCatalog = BUNDLED_BOOKS.map(book => ({...book}));
    let bookLoading = false;
    let game = {running:false, score:0, lives:5, speed:1, words:[], spawnTimer:null, frame:null, lastTime:0};
    let toastTimer;

    function syncBookSession() {
      state.bookSessions[state.activeBookId] = {
        scores: state.scores,
        wrong: state.wrong,
        learned: state.learned,
        dailyPlans: state.dailyPlans,
        reviewPreferences: state.reviewPreferences,
        current: state.current,
        order: state.order,
        orderScope: state.orderScope,
        reviewDate: state.reviewDate
      };
    }

    function persist() {
      syncBookSession();
      localStorage.setItem(STORE_KEY, JSON.stringify({
        mode: state.mode, dailyGoal: state.dailyGoal, todayCount: state.todayCount, day: TODAY_KEY,
        activeBookId: state.activeBookId, activeBookName: state.activeBookName, bookSessions: state.bookSessions,
        quizScope: state.quizScope, storySeed: state.storySeed
      }));
    }

    function wordByName(name) { return library.find(item => item.key === name) || library.find(item => item.word === name); }
    function scoreOf(name) { return Number(state.scores[name]) || 0; }
    function planForDate(dateKey, create=false) {
      let plan = state.dailyPlans[dateKey];
      if (!plan && create) {
        plan = {wordKeys:[], learnedKeys:[], target:state.dailyGoal, additions:0, createdAt:new Date().toISOString()};
        state.dailyPlans[dateKey] = plan;
      }
      if (!plan) return null;
      plan.wordKeys = Array.isArray(plan.wordKeys) ? [...new Set(plan.wordKeys)] : [];
      plan.learnedKeys = Array.isArray(plan.learnedKeys) ? [...new Set(plan.learnedKeys)] : [];
      plan.target = Number(plan.target) || plan.wordKeys.length || state.dailyGoal;
      plan.additions = Number(plan.additions) || 0;
      return plan;
    }

    function pickPlanWords(count, currentKeys=[]) {
      const wanted = Math.max(0, Math.floor(Number(count) || 0));
      const current = new Set(currentKeys);
      const historicallyPlanned = new Set(Object.values(state.dailyPlans).flatMap(plan => Array.isArray(plan?.wordKeys) ? plan.wordKeys : []));
      const learned = new Set(state.learned);
      const groups = [
        library.filter(item => !current.has(item.key) && !historicallyPlanned.has(item.key) && !learned.has(item.key)),
        library.filter(item => !current.has(item.key) && !historicallyPlanned.has(item.key)),
        library.filter(item => !current.has(item.key) && scoreOf(item.key) < 3),
        library.filter(item => !current.has(item.key))
      ];
      const selected = [];
      const selectedKeys = new Set();
      for (const group of groups) {
        for (const item of group) {
          if (selected.length >= wanted) return selected;
          if (!selectedKeys.has(item.key)) { selected.push(item.key); selectedKeys.add(item.key); }
        }
      }
      return selected;
    }

    function ensureTodayPlan() {
      const plan = planForDate(TODAY_KEY, true);
      const available = new Set(library.map(item => item.key));
      plan.wordKeys = plan.wordKeys.filter(key => available.has(key));
      plan.learnedKeys = plan.learnedKeys.filter(key => available.has(key) && plan.wordKeys.includes(key));
      if (!plan.wordKeys.length) {
        plan.wordKeys = pickPlanWords(state.dailyGoal);
        plan.target = plan.wordKeys.length;
        plan.createdAt = new Date().toISOString();
      }
      return plan;
    }

    function todayPlanWords() { return ensureTodayPlan().wordKeys.map(wordByName).filter(Boolean); }
    function todayLearnedSet() { return new Set(ensureTodayPlan().learnedKeys); }
    function todayLearnedCount() { return ensureTodayPlan().learnedKeys.length; }
    function todayPlanComplete() {
      const plan = ensureTodayPlan();
      return plan.wordKeys.length > 0 && plan.wordKeys.every(key => plan.learnedKeys.includes(key));
    }
    function markLearned(name) {
      if (!state.learned.includes(name)) state.learned.push(name);
      const plan = ensureTodayPlan();
      if (plan.wordKeys.includes(name) && !plan.learnedKeys.includes(name)) plan.learnedKeys.push(name);
      state.todayCount = todayLearnedCount();
    }
    function addWordsToToday(count) {
      const plan = ensureTodayPlan();
      const additions = pickPlanWords(count, plan.wordKeys);
      if (!additions.length) return 0;
      const firstNewIndex = plan.wordKeys.length;
      plan.wordKeys.push(...additions);
      plan.additions += additions.length;
      plan.target = plan.wordKeys.length;
      state.orderScope = 'today';
      state.reviewDate = null;
      state.current = firstNewIndex;
      return additions.length;
    }

    function applyDailyGoalToToday(goal) {
      const plan = ensureTodayPlan();
      if (plan.learnedKeys.length || plan.additions) return false;
      if (goal < plan.wordKeys.length) plan.wordKeys = plan.wordKeys.slice(0, goal);
      if (goal > plan.wordKeys.length) plan.wordKeys.push(...pickPlanWords(goal - plan.wordKeys.length, plan.wordKeys));
      plan.target = plan.wordKeys.length;
      state.current = Math.min(state.current, Math.max(0, plan.wordKeys.length - 1));
      return true;
    }

    function studyWords() {
      const base = state.order.map(wordByName).filter(Boolean);
      if (state.orderScope === 'wrong' || state.orderScope === 'calendar' || state.orderScope === 'manual') return base;
      return todayPlanWords();
    }
    function currentWord() {
      const words = studyWords();
      if (!words.length) return library[0];
      state.current = ((state.current % words.length) + words.length) % words.length;
      return words[state.current];
    }
    function escapeHTML(value='') {
      return String(value).replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    }
    function short(value='', max=78) { value = String(value); return value.length > max ? value.slice(0,max-1) + '…' : value; }
    function shuffled(items) { return [...items].sort(() => Math.random() - .5); }

    function valueText(value) {
      if (Array.isArray(value)) return value.map(valueText).filter(Boolean).join('；');
      if (value && typeof value === 'object') return value.meaning || value.definition || value.translation || value.text || value.chinese || value.english || '';
      return value == null ? '' : String(value).trim();
    }

    function listOf(value) { return Array.isArray(value) ? value : (value == null || value === '' ? [] : [value]); }
    function textList(value) { return listOf(value).map(valueText).filter(Boolean); }

    function normalizeWords(raw) {
      const source = Array.isArray(raw) ? raw : (raw?.words || raw?.data || raw?.vocabulary || raw?.entries || []);
      const normalized = source.map(item => {
        if (typeof item === 'string') item = {word:item};
        if (!item || typeof item !== 'object') return null;
        const word = valueText(item.word || item.term || item.english || item.name).trim();
        if (!word) return null;
        const definitions = listOf(item.definitions || item.senses).map(sense => {
          if (typeof sense === 'string') return {pos:'', chinese:sense, english:''};
          return {
            pos:valueText(sense?.part_of_speech || sense?.partOfSpeech || sense?.pos),
            chinese:valueText(sense?.chinese || sense?.zh || sense?.meaning || sense?.translation || sense?.definition),
            english:valueText(sense?.english || sense?.en || sense?.english_definition || sense?.definition_en)
          };
        }).filter(sense => sense.chinese || sense.english);
        const examples = listOf(item.examples || item.example || item.sentence).map(example => {
          if (typeof example === 'string') return {type:'例句', english:example, chinese:''};
          return {
            type:valueText(example?.type || example?.label) || '例句',
            english:valueText(example?.english || example?.en || example?.sentence || example?.text || example?.example),
            chinese:valueText(example?.chinese || example?.zh || example?.translation)
          };
        }).filter(example => example.english || example.chinese);
        const memories = textList(item.memory || item.mnemonic);
        const cognates = textList(item.cognates || item.cognates_text || item.related_words);
        const synonyms = textList(item.synonyms || item.synonyms_text);
        const antonyms = textList(item.antonyms || item.antonyms_text);
        const notes = textList(item.notes);
        const senseText = definitions.map(sense => `${sense.pos} ${sense.chinese}`.trim()).filter(Boolean).join('；');
        const englishText = definitions.map(sense => `${sense.pos} ${sense.english}`.trim()).filter(Boolean).join('; ');
        const memory = memories[0] || notes[0] || '';
        const example = examples[0]?.english || '';
        return {
          word,
          phonetic: valueText(item.phonetic || item.ipa || item.pronunciation),
          zh: valueText(item.zh || item.meaning || item.translation || item.chinese || item.definition) || senseText || '暂无释义',
          en: valueText(item.en || item.englishMeaning || item.definition_en) || englishText,
          example,
          memory,
          definitions,
          examples,
          memories,
          cognates,
          synonyms,
          antonyms,
          notes,
          source:item.source || null,
          index:item.index ?? null
        };
      }).filter(Boolean);
      const totals = normalized.reduce((map,item) => map.set(item.word.toLowerCase(), (map.get(item.word.toLowerCase()) || 0) + 1), new Map());
      const occurrences = new Map();
      return normalized.map((item,position) => {
        const base = item.word.toLowerCase();
        const occurrence = (occurrences.get(base) || 0) + 1;
        occurrences.set(base, occurrence);
        const suffix = item.index ?? occurrence ?? position + 1;
        return {...item, key:totals.get(base)>1 ? `${item.word}#${suffix}` : item.word};
      });
    }

    function bookTitle(raw, fallback='未命名词库') {
      return valueText(raw?.title || raw?.name || raw?.book_name) || fallback.replace(/\.json$/i,'');
    }

    function upsertCatalog(entry) {
      const index = bookCatalog.findIndex(item => item.id === entry.id);
      if (index >= 0) bookCatalog[index] = {...bookCatalog[index], ...entry};
      else bookCatalog.push(entry);
    }

    function openBookDatabase() {
      return new Promise((resolve, reject) => {
        if (!('indexedDB' in window)) return reject(new Error('IndexedDB unavailable'));
        const request = indexedDB.open('sat-wordbook-library', 1);
        request.onupgradeneeded = () => {
          if (!request.result.objectStoreNames.contains('books')) request.result.createObjectStore('books', {keyPath:'id'});
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function dbRequest(mode, action) {
      const db = await openBookDatabase();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction('books', mode);
        const store = transaction.objectStore('books');
        const request = action(store);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
        transaction.oncomplete = () => db.close();
      });
    }

    const dbListBooks = () => dbRequest('readonly', store => store.getAll());
    const dbGetBook = id => dbRequest('readonly', store => store.get(id));
    const dbPutBook = record => dbRequest('readwrite', store => store.put(record));
    const dbDeleteBook = id => dbRequest('readwrite', store => store.delete(id));

    function loadOfflineWordbook(entry) {
      if (!entry.bundledKey || !entry.offlineUrl) return Promise.reject(new Error('没有离线词库资源'));
      const existing = window.__SAT_BUNDLED_WORDBOOKS__?.[entry.bundledKey];
      if (existing) return Promise.resolve(existing);
      if (offlineBookLoads.has(entry.bundledKey)) return offlineBookLoads.get(entry.bundledKey);
      const loading = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = entry.offlineUrl;
        script.onload = () => {
          const raw = window.__SAT_BUNDLED_WORDBOOKS__?.[entry.bundledKey];
          if (raw) resolve(raw);
          else reject(new Error('离线词库脚本中没有找到数据'));
        };
        script.onerror = () => { script.remove(); reject(new Error('离线词库脚本加载失败')); };
        document.head.appendChild(script);
      });
      offlineBookLoads.set(entry.bundledKey, loading);
      return loading;
    }

    async function loadUploadedCatalog() {
      try {
        const books = await dbListBooks();
        books.forEach(book => upsertCatalog({id:book.id, name:book.name, source:'uploaded'}));
      } catch (error) {
        console.info('当前环境不支持持久保存导入词库。');
      }
    }

    async function loadWordbookManifest() {
      try {
        const response = await fetch('./word_list/wordbooks.json', {cache:'no-store'});
        if (!response.ok) return;
        const manifest = await response.json();
        const entries = Array.isArray(manifest) ? manifest : (manifest.books || []);
        entries.forEach(entry => {
          const url = entry.url || entry.file;
          if (!url) return;
          const resolved = new URL(url, response.url).href;
          const isDefault = decodeURIComponent(resolved).endsWith('SAT词汇词根 联想记忆法(乱序版) (俞敏洪).json');
          upsertCatalog({id:isDefault ? DEFAULT_BOOK_ID : `url:${resolved}`, name:entry.name || entry.title || decodeURIComponent(url).split('/').pop().replace(/\.json$/i,''), url:resolved, source:isDefault?'builtin':'url'});
        });
      } catch (error) { /* file:// 下由离线词库和导入按钮接管 */ }
    }

    async function scanWordbookDirectory(silent=false) {
      if (location.protocol === 'file:') {
        if (!silent) toast('直接打开网页时，请点击“导入 JSON”选择新词库');
        return;
      }
      try {
        const response = await fetch('./word_list/', {cache:'no-store'});
        if (!response.ok) throw new Error('目录不可读取');
        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        let added = 0;
        [...doc.querySelectorAll('a[href]')].forEach(anchor => {
          const href = anchor.getAttribute('href');
          if (!href || !/\.json(?:$|[?#])/i.test(href) || /wordbooks\.json(?:$|[?#])/i.test(href)) return;
          const resolved = new URL(href, response.url).href;
          const filename = decodeURIComponent(new URL(resolved).pathname.split('/').pop());
          const isDefault = filename === 'SAT词汇词根 联想记忆法(乱序版) (俞敏洪).json';
          const id = isDefault ? DEFAULT_BOOK_ID : `url:${resolved}`;
          const existing = bookCatalog.find(item => item.id === id);
          if (!bookCatalog.some(item => item.id === id)) added += 1;
          upsertCatalog({id, name:isDefault?(existing?.name || 'SAT词汇词根+联想记忆法（乱序版）'):(existing?.name || filename.replace(/\.json$/i,'')), url:resolved, source:isDefault?'builtin':'url'});
        });
        renderBookbar();
        if (!silent) toast(added ? `发现 ${added} 个新词库` : '词库目录已是最新');
      } catch (error) {
        if (!silent) toast('服务器未开放目录列表，请使用“导入 JSON”');
      }
    }

    async function importWordbookFiles(files) {
      const list = [...files];
      if (!list.length) return;
      let lastId = null;
      for (const file of list) {
        try {
          const raw = JSON.parse(await file.text());
          const words = normalizeWords(raw);
          if (!words.length) throw new Error('没有识别到单词');
          const safeName = file.name.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g,'-').replace(/^-|-$/g,'');
          const id = `upload:${safeName || 'wordbook'}`;
          const name = bookTitle(raw, file.name);
          let persisted = true;
          try { await dbPutBook({id, name, fileName:file.name, words, updatedAt:Date.now()}); }
          catch (error) { persisted = false; }
          upsertCatalog({id, name, source:'uploaded', words:persisted?undefined:words});
          lastId = id;
        } catch (error) {
          toast(`${file.name} 导入失败：${error.message}`);
        }
      }
      document.getElementById('bookFileInput').value = '';
      renderBookbar();
      if (lastId) await switchWordbook(lastId);
    }

    async function switchWordbook(id, options={}) {
      if (bookLoading) return;
      const entry = bookCatalog.find(item => item.id === id);
      if (!entry) return toast('找不到这个词库，请重新扫描或导入');
      bookLoading = true;
      renderBookbar();
      try {
        let words = [];
        if (entry.source === 'uploaded') {
          const record = entry.words ? null : await dbGetBook(entry.id);
          words = entry.words || record?.words || [];
        } else {
          try {
            let raw = null;
            if (entry.bundledKey && entry.offlineUrl) raw = await loadOfflineWordbook(entry);
            else {
              const response = await fetch(entry.url, {cache:'no-store'});
              if (!response.ok) throw new Error(`HTTP ${response.status}`);
              raw = await response.json();
            }
            entry.name = bookTitle(raw, entry.name);
            words = normalizeWords(raw);
          } catch (error) {
            if (entry.id === DEFAULT_BOOK_ID && offlineImported.length) words = [...offlineImported];
            else throw error;
          }
        }
        if (!words.length) throw new Error('这个 JSON 中没有识别到有效单词');

        syncBookSession();
        state.activeBookId = entry.id;
        state.activeBookName = entry.name;
        const session = state.bookSessions[entry.id] || {scores:{}, wrong:[], learned:[], dailyPlans:{}, reviewPreferences:{}, current:0, order:[], orderScope:'today'};
        state.scores = session.scores || {};
        state.wrong = Array.isArray(session.wrong) ? session.wrong : [];
        state.learned = Array.isArray(session.learned) ? session.learned : Object.keys(state.scores).filter(key => Number(state.scores[key]) !== 0);
        state.dailyPlans = session.dailyPlans && typeof session.dailyPlans === 'object' ? session.dailyPlans : {};
        state.reviewPreferences = session.reviewPreferences && typeof session.reviewPreferences === 'object' ? session.reviewPreferences : {};
        state.current = Number(session.current) || 0;
        state.order = Array.isArray(session.order) ? session.order : [];
        state.orderScope = ['today','wrong','calendar','manual'].includes(session.orderScope) ? session.orderScope : 'today';
        state.reviewDate = session.reviewDate || null;
        library = words;

        const available = new Set(library.map(item => item.key));
        state.wrong = state.wrong.filter(name => available.has(name));
        state.learned = state.learned.filter(name => available.has(name));
        state.reviewPreferences = Object.fromEntries(Object.entries(state.reviewPreferences).filter(([name]) => available.has(name)));
        state.order = state.order.filter(name => available.has(name));
        if (state.orderScope === 'today') state.order = [];
        ensureTodayPlan();
        state.current = Math.min(state.current, Math.max(0, state.order.length-1));
        state.quiz = null;
        persist();
        renderApp();
        if (!options.silent) toast(`已切换：${entry.name}（${library.length} 词）`);
      } catch (error) {
        toast(`词库加载失败：${error.message}`);
      } finally {
        bookLoading = false;
        renderBookbar();
      }
    }

    async function deleteCurrentUploadedBook() {
      const entry = bookCatalog.find(item => item.id === state.activeBookId);
      if (!entry || entry.source !== 'uploaded') return;
      if (!confirm(`确定删除已导入的词库“${entry.name}”吗？`)) return;
      try { await dbDeleteBook(entry.id); } catch (error) { /* 内存导入无需数据库删除 */ }
      bookCatalog = bookCatalog.filter(item => item.id !== entry.id);
      delete state.bookSessions[entry.id];
      await switchWordbook(DEFAULT_BOOK_ID);
    }

    async function bootstrapWordbooks() {
      await Promise.allSettled([loadUploadedCatalog(), loadWordbookManifest(), scanWordbookDirectory(true)]);
      const target = bookCatalog.some(item => item.id === state.activeBookId) ? state.activeBookId : DEFAULT_BOOK_ID;
      await switchWordbook(target, {silent:true});
    }

    function toast(message) {
      const node = document.getElementById('toast');
      node.textContent = message;
      node.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => node.classList.remove('show'), 2100);
    }
    function speak(name) {
      if (!('speechSynthesis' in window)) return toast('当前浏览器不支持语音朗读');
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(name);
      utter.lang = 'en-US'; utter.rate = .82;
      speechSynthesis.speak(utter);
    }
    function addWrong(name) {
      if (!state.wrong.includes(name)) state.wrong.push(name);
      persist();
    }
    function markProgress(name, amount) {
      const wasComplete = todayPlanComplete();
      state.scores[name] = Math.max(0, Math.min(3, scoreOf(name) + amount));
      markLearned(name);
      persist();
      if (!wasComplete && todayPlanComplete()) setTimeout(celebrateGoal, 80);
    }
    function celebrateGoal() {
      document.querySelector('.celebration')?.remove();
      const layer = document.createElement('div');
      layer.className = 'celebration';
      layer.innerHTML = '<strong>✦ 今日目标完成 ✦</strong>';
      for (let i=0; i<26; i++) {
        const spark = document.createElement('i');
        spark.textContent = i % 3 === 0 ? '◆' : '✦';
        spark.style.left = `${45 + Math.random()*10}%`;
        spark.style.setProperty('--x', `${(Math.random()-.5)*760}px`);
        spark.style.setProperty('--y', `${(Math.random()-.55)*620}px`);
        spark.style.color = i % 2 ? 'var(--cyan)' : 'var(--pink)';
        spark.style.animationDelay = `${Math.random()*.25}s`;
        layer.appendChild(spark);
      }
      document.body.appendChild(layer);
      setTimeout(() => layer.remove(), 2450);
    }

    function renderBookbar() {
      const host = document.getElementById('bookbar');
      if (!host) return;
      const currentEntry = bookCatalog.find(item => item.id === state.activeBookId);
      const sortedBooks = [...bookCatalog].sort((a,b) => a.id === DEFAULT_BOOK_ID ? -1 : b.id === DEFAULT_BOOK_ID ? 1 : a.name.localeCompare(b.name,'zh-CN'));
      host.innerHTML = `<div class="bookbar glass ${bookLoading?'book-loading':''}">
        <div class="book-current"><div class="book-icon">▤</div><div><small>当前单词表</small><strong>${escapeHTML(state.activeBookName)}</strong><em>${library.length} 词</em></div></div>
        <div class="book-actions">
          <select class="book-select" id="bookSelect" aria-label="选择单词表" ${bookLoading?'disabled':''}>${sortedBooks.map(book => `<option value="${escapeHTML(book.id)}" ${book.id===state.activeBookId?'selected':''}>${escapeHTML(book.name)}</option>`).join('')}</select>
          <button class="btn btn-ghost" id="scanBooks">↻ 扫描词表</button>
          <button class="btn btn-cyan" id="importBooks">＋ 导入 JSON</button>
          ${currentEntry?.source==='uploaded'?'<button class="btn btn-red" id="deleteBook">删除当前导入</button>':''}
        </div>
      </div>`;
      const selector = document.getElementById('bookSelect');
      selector.onchange = () => switchWordbook(selector.value);
      document.getElementById('scanBooks').onclick = () => scanWordbookDirectory(false);
      document.getElementById('importBooks').onclick = () => document.getElementById('bookFileInput').click();
      const deleteButton = document.getElementById('deleteBook');
      if (deleteButton) deleteButton.onclick = deleteCurrentUploadedBook;
    }

    function renderOverview() {
      const mastered = [...new Set(state.learned)].map(wordByName).filter(item => item && !needsMoreReview(item)).length;
      const total = library.length;
      const plan = ensureTodayPlan();
      const learnedToday = todayLearnedCount();
      const pendingToday = Math.max(0, plan.wordKeys.length - learnedToday);
      const percent = Math.min(100, (learnedToday / Math.max(1, plan.wordKeys.length)) * 100);
      document.getElementById('overview').innerHTML = `
        <div class="overview">
          <article class="hero glass">
            <h1>Conquer <span class="gradient-word">SAT Words</span></h1>
            <p class="hero-copy">用闪卡、测验、拼写、错词本、间隔重复、AI故事和打字战场，把抽象词汇变成长久记忆。每天的学习清单按目标生成后固定保存，完成后可由你决定是否追加新词。</p>
            <div class="stat-grid">
              <div class="stat"><strong>${total}</strong><span>词库总量</span></div>
              <div class="stat"><strong>${pendingToday}</strong><span>今日待学习</span></div>
              <div class="stat"><strong>${mastered}</strong><span>暂时掌握</span></div>
              <div class="stat"><strong>${state.wrong.length}</strong><span>错词数量</span></div>
            </div>
          </article>
          <aside class="goal glass">
            <h2><span>◎</span>每日固定计划</h2>
            <p>${learnedToday===0 && !plan.additions?'今天还未开始，保存目标会立即按数量调整并固定清单。':'今天已经开始，当前清单保持固定；修改目标会从下一个新日期生效。'}</p>
            <div class="goal-row"><label for="dailyGoal">每日目标词数</label><input class="goal-input" id="dailyGoal" type="number" min="1" max="100" value="${state.dailyGoal}"><button class="btn btn-cyan" id="saveGoal">▣ 保存</button></div>
            <div class="progress-label"><span>今日完成进度</span><span>${learnedToday} / ${plan.wordKeys.length}</span></div>
            <div class="progress"><i style="width:${percent}%"></i></div>
          </aside>
        </div>`;
      document.getElementById('saveGoal').onclick = () => {
        state.dailyGoal = Math.max(1, Math.min(100, Number(document.getElementById('dailyGoal').value) || 7));
        const appliedToday = applyDailyGoalToToday(state.dailyGoal);
        persist(); renderApp();
        toast(appliedToday ? `今日固定清单已按目标调整为 ${ensureTodayPlan().wordKeys.length} 词` : '每日目标已保存，将从下一个新日期生效');
