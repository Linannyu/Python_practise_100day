    function sectionHeader(icon, title, actions='') {
      return `<div class="section-head"><h2><span>${icon}</span> ${title}</h2><div class="head-actions">${actions}</div></div>`;
    }

    function detailSection(title, body, className='') {
      return body ? `<section class="detail-section ${className}"><h4>${escapeHTML(title)}</h4>${body}</section>` : '';
    }

    function richDetailsHTML(word) {
      const definitions = word.definitions?.length ? word.definitions : [{pos:'', chinese:word.zh, english:word.en}];
      const chinese = definitions.filter(item => item.chinese).map(item => `<p>${item.pos?`<span class="detail-pos">${escapeHTML(item.pos)}</span>`:''}${escapeHTML(item.chinese)}</p>`).join('');
      const english = definitions.filter(item => item.english).map(item => `<p>${item.pos?`<span class="detail-pos">${escapeHTML(item.pos)}</span>`:''}${escapeHTML(item.english)}</p>`).join('');
      const examples = (word.examples?.length ? word.examples : (word.example ? [{type:'例句',english:word.example,chinese:''}] : [])).map(item => `<p><span class="detail-pos">${escapeHTML(item.type || '例句')}</span>${escapeHTML(item.english || '')}</p>${item.chinese?`<p class="detail-translation">${escapeHTML(item.chinese)}</p>`:''}`).join('');
      const memories = (word.memories?.length ? word.memories : [word.memory]).filter(Boolean).map(item => `<p>${escapeHTML(item)}</p>`).join('');
      const joined = values => values?.length ? `<p>${values.map(escapeHTML).join('；')}</p>` : '';
      const source = word.source?.pdf ? `<p class="detail-source">${escapeHTML(word.source.pdf)}${word.source.pages?.length?` · PDF 第 ${escapeHTML(word.source.pages.join('、'))} 页`:''}</p>` : '';
      return `<div class="rich-details">
        ${detailSection('中文释义', chinese)}
        ${detailSection('English definition', english)}
        ${detailSection('例句与中文释义', examples)}
        ${detailSection('词根词缀 / 记忆法', memories)}
        ${detailSection('同源词', joined(word.cognates))}
        ${detailSection('同义词', joined(word.synonyms))}
        ${detailSection('反义词', joined(word.antonyms))}
        ${detailSection('补充说明', joined(word.notes))}
        ${detailSection('内容来源', source)}
      </div>`;
    }

    function renderLearning() {
      const word = currentWord();
      const words = studyWords();
      const isToday = state.orderScope === 'today';
      const plan = ensureTodayPlan();
      const learnedToday = todayLearnedSet();
      const isComplete = todayPlanComplete();
      const contextTitle = isToday ? '今日学习列表' : state.orderScope === 'calendar' ? `${state.reviewDate || '历史日期'} 复习列表` : state.orderScope === 'manual' ? '待复习单词列表' : '错词复习列表';
      const contextTag = isToday ? `${words.length} 词 · 今日固定` : state.orderScope === 'calendar' ? '日历复习' : state.orderScope === 'manual' ? '自主选择复习' : '错词复习';
      const contextCopy = isToday
        ? '清单每天固定；全部学习一次后，可自行选择追加多少单词。'
        : state.orderScope === 'calendar' ? '这些词来自所选日期的实际学习记录。' : state.orderScope === 'manual' ? '这些词由“不好看”页面的待复习状态生成，不会改变今日固定清单。' : '这些词来自错词本，不会改变今日固定清单。';
      const returnToday = isToday ? '' : '<button class="mode-btn" id="returnToday">返回今日计划</button>';
      const remainingCandidates = library.length - new Set(plan.wordKeys).size;
      const addPanel = isToday && isComplete ? `<div class="daily-add-panel">
        <strong>✓ 今天的 ${plan.wordKeys.length} 个单词已全部学习</strong>
        ${remainingCandidates > 0 ? `<p>是否继续？输入想追加的单词数量；原清单会保留，新词只会追加在后面。</p><div class="daily-add-row"><input id="addDailyCount" type="number" min="1" max="100" value="5" aria-label="追加单词数量"><button class="btn btn-cyan" id="addDailyWords">＋ 追加单词</button></div>` : '<p>当前词表的单词都已经安排进今天的清单。</p>'}
      </div>` : '';
      document.getElementById('workspace').innerHTML = `
        ${sectionHeader('▣','学习模式', `
          <button class="mode-btn ${state.mode==='card'?'active':''}" data-mode="card">闪卡</button>
          <button class="mode-btn ${state.mode==='spell'?'active':''}" data-mode="spell">拼写</button>
          ${returnToday}`)}
        <div class="study-layout">
          <article class="study-card-shell glass">
            ${state.mode === 'card' ? flashcardHTML(word) : spellingHTML(word)}
          </article>
          <aside class="today-list glass">
            <h3><span>☷</span>${escapeHTML(contextTitle)}<small class="list-context">${escapeHTML(contextTag)}</small></h3>
            <p>${escapeHTML(contextCopy)}</p>
            <div class="word-list">${words.map((item,index) => {
              const learned = isToday ? learnedToday.has(item.key) : state.learned.includes(item.key);
              return `
              <button class="word-row ${index===state.current?'current':''}" data-index="${index}">
                <span><strong>${escapeHTML(item.word)}</strong><small>${escapeHTML(short(item.zh,35))}</small></span><span class="score-pill ${learned?'learned':''}">${isToday?(learned?'已学':'待学'):scoreOf(item.key)}</span>
              </button>`;
            }).join('') || '<div class="empty"><div><strong>当前没有可复习单词</strong>返回今日计划或从日历选择其他日期。</div></div>'}</div>
            ${addPanel}
          </aside>
        </div>`;

      document.querySelectorAll('[data-mode]').forEach(btn => btn.onclick = () => { state.mode = btn.dataset.mode; persist(); renderLearning(); });
      document.querySelectorAll('.word-row').forEach(btn => btn.onclick = () => { state.current = Number(btn.dataset.index); persist(); renderLearning(); });
      const returnButton = document.getElementById('returnToday');
      if (returnButton) returnButton.onclick = () => { state.orderScope='today'; state.order=[]; state.reviewDate=null; state.current=0; persist(); renderApp(); };
      const addButton = document.getElementById('addDailyWords');
      if (addButton) addButton.onclick = () => {
        if (!todayPlanComplete()) return toast('请先完成今天已有的单词');
        const count = Math.max(1, Math.min(100, Number(document.getElementById('addDailyCount').value) || 0));
        const added = addWordsToToday(count);
        persist(); renderOverview(); renderLearning();
        toast(added ? `已在今日固定清单后追加 ${added} 个单词` : '当前词表没有更多可追加的单词');
      };
      if (state.mode === 'card') bindFlashcard(word); else bindSpelling(word);
    }

    function flashcardHTML(word) {
      return `<div class="flashcard" id="flashcard" data-flipped="false">
          <div id="cardFace">
            <div class="flip-hint">点击卡片翻转</div>
            <h3 class="word-title">${escapeHTML(word.word)}</h3>
            <div class="phonetic">${escapeHTML(word.phonetic)}</div>
            <div class="front-note">☝ 先主动回忆释义，再点击查看答案。</div>
          </div>
        </div>
        <div class="card-controls">
          <button class="btn btn-green" id="know">✓ 认识</button>
          <button class="btn btn-red" id="unknown">× 不认识</button>
          <button class="btn btn-ghost" id="speak">🔊 发音</button>
          <button class="btn btn-ghost" id="next">» 下一个</button>
        </div>`;
    }

    function bindFlashcard(word) {
      const card = document.getElementById('flashcard');
      card.onclick = () => {
        const flipped = card.dataset.flipped === 'true';
        card.dataset.flipped = String(!flipped);
        document.getElementById('cardFace').innerHTML = !flipped ? `
          <h3 class="word-title" style="font-size:46px">${escapeHTML(word.word)}</h3><div class="phonetic">${escapeHTML(word.phonetic)}</div>
          ${richDetailsHTML(word)}` : `
          <div class="flip-hint">点击卡片翻转</div><h3 class="word-title">${escapeHTML(word.word)}</h3><div class="phonetic">${escapeHTML(word.phonetic)}</div><div class="front-note">☝ 先主动回忆释义，再点击查看答案。</div>`;
      };
      document.getElementById('know').onclick = () => { markProgress(word.key, 1); nextStudy(); toast(scoreOf(word.key)>=3 ? `${word.word} 已暂时掌握` : `${word.word} 熟悉度 +1`); };
      document.getElementById('unknown').onclick = () => { markProgress(word.key, -1); addWrong(word.key); nextStudy(); toast(`${word.word} 已加入错词本`); };
      document.getElementById('speak').onclick = () => speak(word.word);
      document.getElementById('next').onclick = nextStudy;
    }

    function spellingHTML(word) {
      return `<div class="spell-box"><div class="spell-prompt"><div><span class="flip-hint">根据释义拼写单词</span><strong>${escapeHTML(word.zh)}</strong><span>${escapeHTML(word.phonetic)}</span></div></div><input class="spell-input" id="spellInput" autocomplete="off" spellcheck="false" placeholder="输入完整英文单词，按回车提交"><div class="feedback" id="spellFeedback"></div><div class="card-controls"><button class="btn btn-cyan" id="spellSubmit">提交答案</button><button class="btn btn-ghost" id="spellHint">显示提示</button><button class="btn btn-ghost" id="speak">🔊 发音</button><button class="btn btn-ghost" id="next">» 换一个</button></div></div>`;
    }

    function bindSpelling(word) {
      const input = document.getElementById('spellInput');
      const feedback = document.getElementById('spellFeedback');
      const submit = () => {
        if (!input.value.trim()) return;
        if (input.value.trim().toLowerCase() === word.word.toLowerCase()) {
          feedback.className='feedback ok'; feedback.textContent='✓ 拼写正确，熟悉度 +1'; markProgress(word.key,1); setTimeout(nextStudy,650);
        } else {
          feedback.className='feedback bad'; feedback.textContent=`× 还差一点，正确答案是 ${word.word}`; markProgress(word.key,-1); addWrong(word.key);
        }
        input.disabled = true; renderOverview();
      };
      document.getElementById('spellSubmit').onclick = submit;
      input.onkeydown = event => { if (event.key === 'Enter') submit(); };
      document.getElementById('spellHint').onclick = () => { input.placeholder = `${word.word[0]}${' ·'.repeat(Math.max(0,word.word.length-2))} ${word.word.at(-1)}（${word.word.length} 个字母）`; input.focus(); };
      document.getElementById('speak').onclick = () => speak(word.word);
      document.getElementById('next').onclick = nextStudy;
      input.focus();
    }

    function nextStudy() {
      const length = studyWords().length;
      state.current = length ? (state.current + 1) % length : 0;
      persist(); renderOverview(); renderLearning();
    }

    function quizWords(scope=state.quizScope) {
      const todayKeys = new Set(ensureTodayPlan().learnedKeys);
      const learnedKeys = scope === 'today'
        ? [...todayKeys]
        : state.learned.filter(key => !todayKeys.has(key));
      return [...new Set(learnedKeys)].map(wordByName).filter(item => item?.zh);
    }

    function newQuiz() {
      const pool = quizWords();
      if (!pool.length) {
        state.quiz = {scope:state.quizScope, empty:true};
        return;
      }
      const answer = pool[Math.floor(Math.random()*pool.length)];
      const distractors = shuffled(pool.filter(item => item.key !== answer.key && item.zh !== answer.zh)).slice(0,3).map(item => item.zh);
      state.quiz = {scope:state.quizScope, word:answer.key, options:shuffled([answer.zh,...distractors]), answered:false, selected:null};
    }

    function renderQuiz() {
      const availableQuizWords = quizWords();
      if (!state.quiz || state.quiz.scope !== state.quizScope || (state.quiz.empty && availableQuizWords.length) || (!state.quiz.empty && !wordByName(state.quiz.word))) newQuiz();
      const q = state.quiz;
      const isTodayScope = state.quizScope === 'today';
      const poolCount = quizWords().length;
      const scopeText = isTodayScope
        ? '只从今天已经完成学习的单词中出题。今日清单里尚未学习的词不会出现。'
        : '只从以前日期实际学过的单词中出题，并排除今天的新学单词。';
      const scopeBar = `<div class="quiz-scope-bar">
        <div class="quiz-scope-copy"><strong>当前测验范围：${isTodayScope?'今天已学单词':'以前学过的单词'}（${poolCount} 词）</strong><span>${escapeHTML(scopeText)}</span></div>
        <div class="quiz-scope-actions"><button class="mode-btn ${isTodayScope?'active':''}" data-quiz-scope="today">今天已学</button><button class="mode-btn ${!isTodayScope?'active':''}" data-quiz-scope="previous">以前学过</button></div>
      </div>`;
      if (q.empty) {
        document.getElementById('workspace').innerHTML = `
          ${sectionHeader('?','选择题测验')}${scopeBar}
          <article class="quiz-panel glass"><div class="empty"><div><strong>这个范围还没有可测验的单词</strong>${isTodayScope?'请先在今日学习页面完成至少一个单词。':'学习记录会按日期保存，之后可以在这里复习以前学过的词。'}</div></div></article>`;
        document.querySelectorAll('[data-quiz-scope]').forEach(btn => btn.onclick = () => { state.quizScope=btn.dataset.quizScope; state.quiz=null; persist(); renderQuiz(); });
        return;
      }
      const word = wordByName(q.word);
      const result = q.answered ? (q.selected === word.zh ? `<div class="quiz-result" style="color:var(--green)">✓ 回答正确！${escapeHTML(word.word)} 就是：${escapeHTML(word.zh)}</div>` : `<div class="quiz-result" style="color:var(--red)">错误。${escapeHTML(word.word)} 的意思是：${escapeHTML(word.zh)}</div>`) : '<div class="quiz-result"></div>';
      document.getElementById('workspace').innerHTML = `
        ${sectionHeader('?','选择题测验','<button class="btn btn-ghost" id="nextQuiz">⟳ 下一题</button>')}
        ${scopeBar}
        <article class="quiz-panel glass"><p class="quiz-kicker">选择下列单词最准确的中文释义：</p><h3 class="quiz-word">${escapeHTML(word.word)}</h3><div class="phonetic">${escapeHTML(word.phonetic)}</div><div class="options">${q.options.map(option => {
          let cls=''; if(q.answered && option===word.zh) cls='correct'; else if(q.answered && option===q.selected) cls='wrong';
          return `<button class="option ${cls}" data-option="${escapeHTML(option)}" ${q.answered?'disabled':''}>${escapeHTML(option)}</button>`;
        }).join('')}</div>${result}</article>`;
      document.getElementById('nextQuiz').onclick = () => { newQuiz(); renderQuiz(); };
      document.querySelectorAll('[data-quiz-scope]').forEach(btn => btn.onclick = () => { state.quizScope=btn.dataset.quizScope; state.quiz=null; persist(); renderQuiz(); });
      document.querySelectorAll('.option').forEach(btn => btn.onclick = () => {
        if (q.answered) return;
        q.answered=true; q.selected=btn.dataset.option;
        if (q.selected===word.zh) markProgress(word.key,1); else { markProgress(word.key,-1); addWrong(word.key); }
        persist(); renderOverview(); renderQuiz();
      });
    }

    function renderWrongBook() {
      const items = state.wrong.map(wordByName).filter(Boolean);
      document.getElementById('workspace').innerHTML = `
        ${sectionHeader('▲','错词本',`<button class="btn btn-ghost" id="reviewWrong">▣ 只复习错词</button><button class="btn btn-red" id="clearWrong">▰ 清空错词本</button>`)}
        <div class="wrong-wrap glass">${items.length ? `<div class="wrong-grid">${items.map(item => `<article class="wrong-card"><h3>${escapeHTML(item.word)}</h3><div class="phonetic">${escapeHTML(item.phonetic)}</div>${richDetailsHTML(item)}<div class="wrong-actions"><button class="btn btn-ghost" data-speak="${escapeHTML(item.word)}">🔊</button><button class="btn btn-green" data-master="${escapeHTML(item.key)}">已掌握</button><button class="btn btn-red" data-remove="${escapeHTML(item.key)}">移除</button></div></article>`).join('')}</div>` : `<div class="empty"><div><strong>错词本是空的</strong>测验或拼写中的错误会自动出现在这里。</div></div>`}</div>`;
      document.querySelectorAll('[data-speak]').forEach(btn => btn.onclick = () => speak(btn.dataset.speak));
      document.querySelectorAll('[data-master]').forEach(btn => btn.onclick = () => { const mastered=wordByName(btn.dataset.master); state.scores[btn.dataset.master]=3; state.wrong=state.wrong.filter(name=>name!==btn.dataset.master); persist(); renderOverview(); renderWrongBook(); toast(`${mastered?.word || btn.dataset.master} 已掌握`); });
      document.querySelectorAll('[data-remove]').forEach(btn => btn.onclick = () => { state.wrong=state.wrong.filter(name=>name!==btn.dataset.remove); persist(); renderOverview(); renderWrongBook(); });
      document.getElementById('reviewWrong').onclick = () => {
        if (!state.wrong.length) return toast('错词本还是空的');
        state.orderScope='wrong'; state.order=[...state.wrong]; state.current=0; state.view='learn'; state.mode='card'; navigate('learn');
      };
      document.getElementById('clearWrong').onclick = () => { if (!state.wrong.length || confirm('确定清空全部错词吗？')) { state.wrong=[]; persist(); renderOverview(); renderWrongBook(); } };
    }

    function reviewPreference(name) { return state.reviewPreferences[name] || 'auto'; }
    function needsMoreReview(item) {
      const preference = reviewPreference(item.key);
      if (preference === 'review') return true;
      if (preference === 'mastered') return false;
      return scoreOf(item.key) < 3;
    }
    function familiarityLabel(score) {
      return ['需要巩固','初步认识','比较熟悉','熟练掌握'][Math.max(0,Math.min(3,score))];
    }
    function learnedDateMap() {
      const dates = new Map();
      Object.keys(state.dailyPlans).sort().forEach(dateKey => {
        const plan = planForDate(dateKey,false);
        (plan?.learnedKeys || []).forEach(key => dates.set(key,dateKey));
      });
      return dates;
    }

    function renderNotGood() {
      const learnedItems = [...new Set(state.learned)].map(wordByName).filter(Boolean);
      const dueItems = learnedItems.filter(needsMoreReview);
      const masteredItems = learnedItems.filter(item => !needsMoreReview(item));
      const query = state.learnedQuery.trim().toLowerCase();
      const filtered = learnedItems.filter(item => {
        const matchesFilter = state.learnedFilter === 'review' ? needsMoreReview(item) : state.learnedFilter === 'mastered' ? !needsMoreReview(item) : true;
        const matchesQuery = !query || item.word.toLowerCase().includes(query) || item.zh.toLowerCase().includes(query);
        return matchesFilter && matchesQuery;
      });
      const dates = learnedDateMap();
      const pageSize = 48;
      const pageCount = Math.max(1,Math.ceil(filtered.length/pageSize));
      state.learnedPage = Math.max(0,Math.min(state.learnedPage,pageCount-1));
      const visible = filtered.slice(state.learnedPage*pageSize,(state.learnedPage+1)*pageSize);
      const cards = visible.map(item => {
        const score = scoreOf(item.key);
        const due = needsMoreReview(item);
        const preference = reviewPreference(item.key);
        return `<article class="learned-card">
          <div class="learned-card-head"><div><h3>${escapeHTML(item.word)}</h3><div class="phonetic">${escapeHTML(item.phonetic)}</div></div><span class="review-state ${due?'':'mastered'}">${due?'需要复习':'无需复习'}</span></div>
          <p class="learned-meaning">${escapeHTML(item.zh)}</p>
          <div class="familiarity-row"><span>熟练度 ${score}/3</span><strong>${escapeHTML(familiarityLabel(score))}</strong></div>
          <div class="familiarity-track"><i style="width:${Math.max(8,score/3*100)}%"></i></div>
          <div class="learned-meta">最近学习：${escapeHTML(dates.get(item.key) || '旧版记录，日期未知')} · 判断：${preference==='auto'?'系统自动':preference==='review'?'你标记为还需复习':'你标记为熟练掌握'}</div>
          <details class="learned-details"><summary>查看完整释义、例句与记忆内容</summary>${richDetailsHTML(item)}</details>
          <div class="learned-card-actions"><button class="btn btn-ghost" data-manager-speak="${escapeHTML(item.word)}">🔊 发音</button><button class="btn btn-red" data-review-more="${escapeHTML(item.key)}">还需复习</button><button class="btn btn-green" data-manager-mastered="${escapeHTML(item.key)}">熟练掌握</button>${preference!=='auto'?`<button class="btn btn-ghost" data-manager-auto="${escapeHTML(item.key)}">恢复系统判断</button>`:''}</div>
        </article>`;
      }).join('');

      document.getElementById('workspace').innerHTML = `
        ${sectionHeader('📊','不好看',dueItems.length?'<button class="btn btn-cyan" id="reviewDueWords">▣ 开始复习待复习词</button>':'')}
        <section class="learned-manager glass">
          <div class="learned-summary"><div class="learned-stat"><strong>${learnedItems.length}</strong><span>已经学习的单词</span></div><div class="learned-stat"><strong>${dueItems.length}</strong><span>目前需要复习</span></div><div class="learned-stat"><strong>${masteredItems.length}</strong><span>熟练或无需复习</span></div></div>
          <div class="learned-toolbar"><div class="learned-filters"><button class="mode-btn ${state.learnedFilter==='all'?'active':''}" data-learned-filter="all">全部已学</button><button class="mode-btn ${state.learnedFilter==='review'?'active':''}" data-learned-filter="review">需要复习</button><button class="mode-btn ${state.learnedFilter==='mastered'?'active':''}" data-learned-filter="mastered">熟练掌握</button></div><div class="learned-search"><input id="learnedSearch" value="${escapeHTML(state.learnedQuery)}" placeholder="搜索已学单词或中文释义"><button class="btn btn-ghost" id="applyLearnedSearch">搜索</button></div></div>
          ${cards?`<div class="learned-grid">${cards}</div>`:`<div class="empty"><div><strong>${learnedItems.length?'没有符合条件的单词':'还没有学习记录'}</strong>${learnedItems.length?'换一个筛选条件或搜索词试试。':'在学习页面完成单词后，它们会自动出现在这里。'}</div></div>`}
          ${filtered.length>pageSize?`<div class="learned-pagination"><button class="btn btn-ghost" id="previousLearnedPage" ${state.learnedPage===0?'disabled':''}>‹ 上一页</button><span>第 ${state.learnedPage+1} / ${pageCount} 页 · ${filtered.length} 词</span><button class="btn btn-ghost" id="nextLearnedPage" ${state.learnedPage>=pageCount-1?'disabled':''}>下一页 ›</button></div>`:''}
        </section>`;

      document.querySelectorAll('[data-learned-filter]').forEach(button => button.onclick = () => { state.learnedFilter=button.dataset.learnedFilter; state.learnedPage=0; renderNotGood(); });
      const runSearch = () => { state.learnedQuery=document.getElementById('learnedSearch').value; state.learnedPage=0; renderNotGood(); };
      document.getElementById('applyLearnedSearch').onclick = runSearch;
      document.getElementById('learnedSearch').onkeydown = event => { if(event.key==='Enter') runSearch(); };
      document.querySelectorAll('[data-manager-speak]').forEach(button => button.onclick = () => speak(button.dataset.managerSpeak));
      document.querySelectorAll('[data-review-more]').forEach(button => button.onclick = () => { state.reviewPreferences[button.dataset.reviewMore]='review'; persist(); renderOverview(); renderNotGood(); toast('已标记为还需复习'); });
      document.querySelectorAll('[data-manager-mastered]').forEach(button => button.onclick = () => { const key=button.dataset.managerMastered; state.reviewPreferences[key]='mastered'; state.scores[key]=3; state.wrong=state.wrong.filter(name=>name!==key); persist(); renderOverview(); renderNotGood(); toast('已标记为熟练掌握'); });
      document.querySelectorAll('[data-manager-auto]').forEach(button => button.onclick = () => { delete state.reviewPreferences[button.dataset.managerAuto]; persist(); renderOverview(); renderNotGood(); toast('已恢复系统熟练度判断'); });
      const previousPage = document.getElementById('previousLearnedPage');
      if(previousPage) previousPage.onclick = () => { state.learnedPage-=1; renderNotGood(); };
      const nextPage = document.getElementById('nextLearnedPage');
      if(nextPage) nextPage.onclick = () => { state.learnedPage+=1; renderNotGood(); };
      const reviewDueButton = document.getElementById('reviewDueWords');
      if(reviewDueButton) reviewDueButton.onclick = () => { state.orderScope='manual'; state.order=dueItems.map(item=>item.key); state.reviewDate=null; state.current=0; state.mode='card'; persist(); navigate('learn'); };
    }

    function renderGame() {
      document.getElementById('workspace').innerHTML = `
        ${sectionHeader('🎮','词汇战场','<button class="btn btn-cyan" id="startGame">▶ 开始</button><button class="btn btn-red" id="stopGame">■ 停止</button>')}
        <div class="game-layout"><div><div class="game-board" id="gameBoard"></div><input id="gameInput" class="game-input" autocomplete="off" spellcheck="false" placeholder="看到哪个单词就输入哪个，回车或完整拼写即可击落..."></div><aside class="battle glass"><h3>Battle Status</h3><div class="battle-stats"><div class="battle-stat"><strong id="gameScore">0</strong><span>得分</span></div><div class="battle-stat"><strong id="gameLives">5</strong><span>剩余机会</span></div><div class="battle-stat"><strong id="gameSpeed">1</strong><span>速度等级</span></div></div><p>击落单词会增加复习分数；漏掉只会扣除生命，不会加入错词本。建议先学习一轮再进入战场。</p></aside></div>`;
      document.getElementById('startGame').onclick = startGame;
      document.getElementById('stopGame').onclick = () => stopGame(true);
      const input = document.getElementById('gameInput');
      input.oninput = checkGameInput;
      input.onkeydown = event => { if(event.key==='Enter') checkGameInput(); };
    }

    function startGame() {
      if (game.running) return;
      const board = document.getElementById('gameBoard');
      if (!board) return;
      board.innerHTML='';
      game={running:true,score:0,lives:5,speed:1,words:[],spawnTimer:null,frame:null,lastTime:performance.now()};
      updateBattle(); spawnFallingWord();
      game.spawnTimer=setInterval(spawnFallingWord,1450);
      game.frame=requestAnimationFrame(animateGame);
      document.getElementById('gameInput').value=''; document.getElementById('gameInput').focus();
      toast('战斗开始：完整拼出单词即可击落');
    }

    function spawnFallingWord() {
      if (!game.running) return;
      const board=document.getElementById('gameBoard'); if(!board) return;
      const candidates=studyWords().length ? studyWords() : library;
      const data=candidates[Math.floor(Math.random()*candidates.length)];
      const el=document.createElement('div'); el.className='falling-word'; el.textContent=data.word;
      board.appendChild(el);
      const maxX=Math.max(10,board.clientWidth-el.offsetWidth-18);
      const item={data,el,x:12+Math.random()*maxX,y:-38,speed:25+Math.random()*18+game.speed*5};
      el.style.transform=`translate(${item.x}px, ${item.y}px)`; game.words.push(item);
    }

    function animateGame(now) {
      if(!game.running) return;
      const board=document.getElementById('gameBoard'); if(!board) return stopGame(false);
      const dt=Math.min(.04,(now-game.lastTime)/1000); game.lastTime=now;
      game.words=[...game.words].filter(item=>{
        item.y+=item.speed*dt;
        item.el.style.transform=`translate(${item.x}px, ${item.y}px)`;
        if(item.y>board.clientHeight-42){ item.el.remove(); game.lives-=1; updateBattle(); if(game.lives<=0){ stopGame(true,'机会用尽，本轮结束'); } return false; }
        return true;
      });
      if(game.running) game.frame=requestAnimationFrame(animateGame);
    }

    function checkGameInput() {
      if(!game.running) return;
      const input=document.getElementById('gameInput'); const value=input.value.trim().toLowerCase();
      const hit=game.words.find(item=>item.data.word.toLowerCase()===value);
      if(!hit) return;
      hit.el.remove(); game.words=game.words.filter(item=>item!==hit); input.value='';
      game.score+=10; game.speed=1+Math.floor(game.score/70); markProgress(hit.data.key,1); updateBattle();
    }

    function updateBattle() {
      const score=document.getElementById('gameScore'), lives=document.getElementById('gameLives'), speed=document.getElementById('gameSpeed');
      if(score) score.textContent=game.score; if(lives) lives.textContent=game.lives; if(speed) speed.textContent=game.speed;
      renderOverview();
    }

    function stopGame(showToast=false, message='本轮战斗已停止') {
      if(game.spawnTimer) clearInterval(game.spawnTimer); if(game.frame) cancelAnimationFrame(game.frame);
      game.running=false; game.spawnTimer=null; game.frame=null;
      if(showToast) toast(`${message} · 得分 ${game.score}`);
    }

    function shiftCalendarMonth(monthKey, amount) {
      const [year, month] = monthKey.split('-').map(Number);
      const shifted = new Date(year, month - 1 + amount, 1);
      return `${shifted.getFullYear()}-${String(shifted.getMonth()+1).padStart(2,'0')}`;
    }

    function renderCalendar() {
      const [year, month] = state.calendarMonth.split('-').map(Number);
      const firstDay = new Date(year, month - 1, 1);
      const daysInMonth = new Date(year, month, 0).getDate();
      const leadingBlanks = firstDay.getDay();
      const monthTitle = new Intl.DateTimeFormat('zh-CN',{year:'numeric',month:'long'}).format(firstDay);
      const cells = Array.from({length:leadingBlanks}, () => '<div class="calendar-blank" aria-hidden="true"></div>');
      for (let day=1; day<=daysInMonth; day++) {
        const dateKey = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const plan = planForDate(dateKey, false);
        const learnedCount = plan?.learnedKeys?.length || 0;
        cells.push(`<button class="calendar-day ${dateKey===TODAY_KEY?'today':''} ${dateKey===state.selectedCalendarDate?'selected':''} ${learnedCount?'has-study':''}" data-calendar-date="${dateKey}"><strong>${day}</strong>${learnedCount?`<small>已学 ${learnedCount} 词</small>`:''}</button>`);
      }

      const selectedPlan = planForDate(state.selectedCalendarDate, false);
      const selectedKeys = [...new Set(selectedPlan?.learnedKeys || [])];
      const selectedWords = selectedKeys.map(wordByName).filter(Boolean);
      const detail = selectedWords.length ? `
        <p>这一天实际完成学习的 ${selectedWords.length} 个单词。点击下方按钮会建立独立复习列表，不会改变今天的固定清单。</p>
        <div class="calendar-word-list">${selectedWords.map(item => `<div class="calendar-word"><strong>${escapeHTML(item.word)}</strong><span>${escapeHTML(short(item.zh,30))}</span></div>`).join('')}</div>
        <button class="btn btn-cyan" id="reviewCalendarDate">▣ 复习这一天的 ${selectedWords.length} 个单词</button>` : `
        <div class="empty"><div><strong>这一天没有学习记录</strong>只有实际完成过学习操作的单词才会出现在日历里。</div></div>`;

      document.getElementById('workspace').innerHTML = `
        ${sectionHeader('📅','学习日历')}
        <div class="calendar-layout">
          <section class="calendar-panel glass">
            <div class="calendar-toolbar"><h3>${escapeHTML(monthTitle)}</h3><div><button class="btn btn-ghost" id="previousMonth">‹ 上月</button><button class="btn btn-ghost" id="currentMonth">本月</button><button class="btn btn-ghost" id="nextMonth">下月 ›</button></div></div>
            <div class="calendar-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
            <div class="calendar-grid">${cells.join('')}</div>
          </section>
          <aside class="calendar-detail glass"><h3>${escapeHTML(state.selectedCalendarDate)}</h3>${detail}</aside>
        </div>`;

      document.getElementById('previousMonth').onclick = () => { state.calendarMonth=shiftCalendarMonth(state.calendarMonth,-1); renderCalendar(); };
      document.getElementById('nextMonth').onclick = () => { state.calendarMonth=shiftCalendarMonth(state.calendarMonth,1); renderCalendar(); };
      document.getElementById('currentMonth').onclick = () => { state.calendarMonth=TODAY_KEY.slice(0,7); state.selectedCalendarDate=TODAY_KEY; renderCalendar(); };
      document.querySelectorAll('[data-calendar-date]').forEach(button => button.onclick = () => { state.selectedCalendarDate=button.dataset.calendarDate; renderCalendar(); });
      const reviewButton = document.getElementById('reviewCalendarDate');
      if (reviewButton) reviewButton.onclick = () => {
        state.orderScope='calendar'; state.reviewDate=state.selectedCalendarDate; state.order=selectedWords.map(item=>item.key); state.current=0; state.mode='card'; persist(); navigate('learn');
      };
    }

    const storyTemplates = [
      names => `At midnight, a young archivist found a coded page inside a forgotten book. Its first clue was the word ${names[0]}; the second was ${names[1]}. She whispered ${names[2]} as she opened the observatory door. A stranger offered one final pair of clues—${names[3]} and ${names[4]}. By dawn, every word had become part of a map she would never forget.`,
      names => `The debate changed direction when Mara wrote ${names[0]} on the board. A note in the margin mentioned ${names[1]}, while an older chapter explained ${names[2]}. She compared both ideas with ${names[3]} and ended with ${names[4]}. The council finally understood how a precise vocabulary can turn confusion into agreement.`,
      names => `Our research team faced a puzzling result, so we built five clues around it. The sequence began with ${names[0]} and moved to ${names[1]}. A hidden pattern connected ${names[2]} with ${names[3]}; the last piece was ${names[4]}. Reading the words aloud transformed a setback into a memorable discovery.`
    ];

    function renderStory() {
      const pool=studyWords().length>=5?studyWords():library;
      const chosen=[]; for(let i=0;i<5;i++) chosen.push(pool[(state.storySeed*7+i*5)%pool.length]);
      const template=storyTemplates[state.storySeed%storyTemplates.length];
      let text=template(chosen.map(item=>item.word));
      chosen.forEach(item=> { text=text.replace(item.word, `<span class="story-word" data-tip="${escapeHTML(item.zh)}">${escapeHTML(item.word)}</span>`); });
      document.getElementById('workspace').innerHTML = `
        ${sectionHeader('⚔','词汇故事','<button class="btn btn-cyan" id="newStory">✦ 生成新故事</button>')}
        <article class="story-panel glass"><div class="story-toolbar"><label for="storyLevel">阅读难度</label><select class="story-select" id="storyLevel"><option>标准 SAT</option><option>轻松复习</option><option>挑战模式</option></select><button class="btn btn-ghost" id="readStory">🔊 朗读故事</button></div><h3 class="story-title">The Midnight Vocabulary Mission</h3><div class="story-subtitle">把鼠标停在高亮词上查看释义；点击下方单词可朗读。</div><div class="story-text" id="storyText">${text}</div><div class="story-vocab">${chosen.map(item=>`<button data-story-word="${escapeHTML(item.word)}">${escapeHTML(item.word)}</button>`).join('')}</div></article>`;
      document.getElementById('newStory').onclick=()=>{state.storySeed+=1;persist();renderStory();};
      document.querySelectorAll('[data-story-word]').forEach(btn=>btn.onclick=()=>speak(btn.dataset.storyWord));
      document.getElementById('readStory').onclick=()=>{
        if(!('speechSynthesis' in window)) return toast('当前浏览器不支持语音朗读');
        speechSynthesis.cancel(); const utter=new SpeechSynthesisUtterance(document.getElementById('storyText').textContent); utter.lang='en-US'; utter.rate=.78; speechSynthesis.speak(utter);
      };
    }

    function renderApp() {
      if(state.view!=='game') stopGame(false);
      document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.view===state.view));
      renderOverview();
      renderBookbar();
      ({learn:renderLearning,quiz:renderQuiz,wrong:renderWrongBook,game:renderGame,story:renderStory,calendar:renderCalendar,notgood:renderNotGood}[state.view] || renderLearning)();
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function navigate(view) {
      state.view=view; location.hash=view; renderApp();
    }

    function setMobileNavigation(open) {
      const navigation = document.getElementById('mainNavigation');
      const toggle = document.getElementById('mobileMenuToggle');
      document.body.classList.toggle('nav-open', open);
      navigation.classList.toggle('open', open);
      document.getElementById('navBackdrop').classList.toggle('show', open);
      toggle.setAttribute('aria-expanded', String(open));
      toggle.setAttribute('aria-label', open ? '关闭导航' : '打开导航');
    }

    document.getElementById('mobileMenuToggle').addEventListener('click', () => setMobileNavigation(true));
    document.getElementById('mobileMenuClose').addEventListener('click', () => setMobileNavigation(false));
    document.getElementById('navBackdrop').addEventListener('click', () => setMobileNavigation(false));
    document.addEventListener('keydown', event => { if (event.key === 'Escape') setMobileNavigation(false); });
    window.addEventListener('resize', () => { if (window.innerWidth > 760) setMobileNavigation(false); });
    document.querySelectorAll('[data-view]').forEach(node=>node.addEventListener('click',()=>{ if(node.dataset.view==='learn'){state.orderScope='today';state.order=[];state.reviewDate=null;state.current=0;} setMobileNavigation(false); navigate(node.dataset.view); }));
    window.addEventListener('hashchange',()=>{ const view=location.hash.replace('#',''); if(view && view!==state.view){state.view=view;renderApp();} });

    if(!['learn','quiz','wrong','game','story','calendar','notgood'].includes(state.view)) state.view='learn';
    if(state.orderScope==='today') state.order=[];
    document.getElementById('bookFileInput').addEventListener('change', event => importWordbookFiles(event.target.files));
    bootstrapWordbooks();
  </script>
</body>
</html>
